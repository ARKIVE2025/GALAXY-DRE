<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0d0d;--bg2:#141414;--border:#1f1f1f;
--green:#00e676;--green-dim:#00c853;--yellow:#ffd600;
--red:#ff1744;--blue:#40c4ff;--white:#e0e0e0;--dim:#555;
--font:'Courier New',Courier,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--green);font-family:var(--font);font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;position:relative}
#topbar{display:flex;align-items:center;gap:8px;background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 16px;flex-shrink:0}
.dot{width:12px;height:12px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
#topbar-title{flex:1;text-align:center;color:var(--dim);font-size:12px;letter-spacing:.08em}
#output{flex:1;overflow-y:auto;padding:16px;line-height:1.6;scroll-behavior:smooth}
#output::-webkit-scrollbar{width:4px}
#output::-webkit-scrollbar-track{background:transparent}
#output::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.line{white-space:pre-wrap;word-break:break-all}
.lo{color:var(--white)}.le{color:var(--red)}.li{color:var(--blue)}.ld{color:var(--dim)}
.pe .u{color:var(--green-dim)}.pe .a{color:var(--dim)}.pe .h{color:var(--green)}.pe .s{color:var(--dim)}.pe .p{color:var(--blue)}.pe .d{color:var(--white)}
.ls-d{color:var(--blue);font-weight:bold}.ls-f{color:var(--white)}.ls-x{color:var(--green)}
#inputbar{display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);padding:10px 16px;background:var(--bg2);flex-shrink:0}
#prompt-label{flex-shrink:0;white-space:nowrap;font-size:13px}
#prompt-label .u{color:var(--green-dim)}#prompt-label .a{color:var(--dim)}#prompt-label .h{color:var(--green)}#prompt-label .s{color:var(--dim)}#prompt-label .p{color:var(--blue)}#prompt-label .d{color:var(--white)}
#cmd-input{flex:1;background:transparent;border:none;outline:none;color:var(--green);font-family:var(--font);font-size:14px;caret-color:var(--green)}
#autocomplete{position:fixed;background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:4px 0;z-index:100;display:none;max-height:200px;overflow-y:auto;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.ac-item{padding:4px 12px;cursor:pointer;color:var(--white);font-family:var(--font);font-size:13px}
.ac-item.sel,.ac-item:hover{background:#2a2a2a;color:var(--green)}
.ac-d{color:var(--blue)}.ac-c{color:var(--green)}
#nano-view{display:none;flex-direction:column;position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:500;color:var(--white);font-family:var(--font)}
#nano-hdr{background:#aaa;color:#000;display:flex;justify-content:space-between;padding:2px 8px;font-size:13px}
#nano-hdr span{flex:1;text-align:center}
#nano-hdr span:first-child{text-align:left}
#nano-hdr span:last-child{text-align:right}
#nano-editor{flex:1;background:transparent;color:var(--white);border:none;outline:none;padding:8px;font-family:var(--font);font-size:14px;resize:none;line-height:1.5}
#nano-statusbar{background:#aaa;color:#000;padding:2px 8px;font-size:12px;display:flex;justify-content:space-between}
#nano-msg{background:#000;color:var(--white);padding:2px 8px;min-height:18px;font-size:13px}
#nano-msg-input{background:transparent;color:var(--white);border:none;outline:none;font-family:var(--font);font-size:13px;width:50%;display:none}
#nano-keys{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#000;border-top:1px solid #333;padding:3px 4px}
.nk{font-size:12px;padding:2px 4px;color:var(--white)}
.nk b{color:#000;background:#aaa;padding:0 3px;border-radius:2px;font-size:11px}
#nano-help{display:none;flex-direction:column;position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:600;padding:0;font-family:var(--font)}
#nano-help-hdr{background:#aaa;color:#000;padding:2px 8px;font-size:13px;text-align:center;font-weight:bold}
#nano-help-body{flex:1;overflow-y:auto;padding:8px 16px;color:var(--white);font-size:13px;line-height:1.8;columns:2;column-gap:32px}
.hrow{display:flex;gap:8px}.hkey{color:var(--yellow);min-width:80px}
#nano-help-footer{background:#aaa;color:#000;padding:2px 8px;font-size:12px;text-align:center}
#less-view{display:none;flex-direction:column;position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:500;font-family:var(--font)}
#less-content{flex:1;overflow-y:auto;padding:8px 16px;color:var(--white);font-size:14px;line-height:1.6;white-space:pre-wrap}
#less-statusbar{background:#fff;color:#000;padding:2px 8px;font-size:12px;display:flex;justify-content:space-between}
#less-search-bar{background:#000;color:var(--white);padding:2px 8px;display:none;font-size:13px}
#less-search-bar span{color:var(--white)}
#less-search-input{background:transparent;color:var(--white);border:none;outline:none;font-family:var(--font);font-size:13px;width:80%}
@media(max-width:600px){html,body{font-size:12px}#output{padding:10px}#inputbar{padding:8px 10px}#nano-keys{grid-template-columns:repeat(3,1fr)}}
</style>

// ─── FS HELPERS ───────────────────────────────────────────────
function normPath(p){
  if(!p||p==='-')return cwd;
  if(!p.startsWith('/'))p=cwd+'/'+p;
  const parts=p.split('/').filter(Boolean);
  const res=[];
  for(const pt of parts){if(pt==='.')continue;if(pt==='..')res.pop();else res.push(pt);}
  return '/'+res.join('/');
}
function getNode(path,root=fs){
  const parts=normPath(path).split('/').filter(Boolean);
  let node=root;
  for(const p of parts){if(!node.children||!node.children[p])return null;node=node.children[p];}
  return node;
}
function getParent(path){
  const n=normPath(path);const parts=n.split('/').filter(Boolean);parts.pop();return'/'+parts.join('/');
}
function basename(path){return normPath(path).split('/').filter(Boolean).pop()||'/';}
function setNode(path,node){
  const n=normPath(path);const parts=n.split('/').filter(Boolean);
  let cur=fs;
  for(let i=0;i<parts.length-1;i++){if(!cur.children[parts[i]])return false;cur=cur.children[parts[i]];}
  cur.children[parts[parts.length-1]]=node;return true;
}
function deleteNode(path){
  const n=normPath(path);const parts=n.split('/').filter(Boolean);
  let cur=fs;
  for(let i=0;i<parts.length-1;i++){if(!cur.children[parts[i]])return;cur=cur.children[parts[i]];}
  delete cur.children[parts[parts.length-1]];
}
function promptStr(){
  let p=normPath(cwd);
  if(p==='/home/analyst')return '~';
  if(p.startsWith('/home/analyst/'))return'~'+p.slice('/home/analyst'.length);
  return p;
}

}

  if(bytes<1024)return bytes+'B';

  return(bytes/1048576).toFixed(1)+'M';
}

function printText(text,cls='lo'){
  if(text===''){printHTML('&nbsp;',cls);return;}
  String(text).split('\n').forEach(l=>printHTML(l?esc(l):'&nbsp;',cls));
}
function printPromptEcho(raw){
  const p=promptStr();

  outEl.appendChild(d);outEl.scrollTop=outEl.scrollHeight;
}

// ─── PARSER ───────────────────────────────────────────────────
function tokenize(input){
  const tokens=[];let cur='',inQ=null;
  for(let i=0;i<input.length;i++){
    const c=input[i];
    if(inQ){if(c===inQ)inQ=null;else cur+=c;}
    else if(c==='"'||c==="'"){inQ=c;}
    else if(c==='\\'&&i+1<input.length){cur+=input[++i];}
    else if(c===' '||c==='\t'){if(cur){tokens.push(cur);cur='';}}
    else{cur+=c;}
  }
  if(cur)tokens.push(cur);
  return tokens;
}
function expandEnv(arg){
  return arg.replace(/\$\{([^}]+)\}|\$([A-Z_][A-Z0-9_]*|\?)/gi,(_,a,b)=>{
    const k=a||b;
    if(k==='?')return String(lastExitCode);
    return env[k]!==undefined?env[k]:'';
  });
}
function resolveArgs(args){return args.map(expandEnv);}

function openNano(filePath){
  const p=normPath(filePath);
  const node=getNode(p);
  if(node&&node.type==='d')return{err:`nano: ${filePath}: Is a directory`};
  inNano=true;nanoState='EDIT';nanoFilePath=filePath;
  nanoOrigContent=node?(node.content||''):'';
  document.getElementById('nano-view').style.display='flex';
  document.getElementById('nano-title').textContent=filePath;
  document.getElementById('nano-fname').textContent=filePath;
  document.getElementById('nano-modified').textContent='';
  document.getElementById('nano-msg-text').textContent=node?'':' [ New File ]';
  document.getElementById('nano-msg-input').style.display='none';
  document.getElementById('nano-help').style.display='none';
  const ed=document.getElementById('nano-editor');
  ed.value=nanoOrigContent;
  ed.focus();
  updateNanoStatus();
  return{out:''};
}
function closeNano(){
  inNano=false;
  document.getElementById('nano-view').style.display='none';
  document.getElementById('cmd-input').focus();
}
function saveNanoFile(path,content){
  const p=normPath(path);
  const existing=getNode(p);
  if(!existing){
    const parent=getNode(getParent(p));
    if(!parent||parent.type!=='d'){
      document.getElementById('nano-msg-text').textContent=` [ Error writing ${path}: No such directory ]`;
      return false;
    }
    setNode(p,{type:'f',content,perms:'644'});
  }else{existing.content=content;}
  nanoOrigContent=content;nanoFilePath=path;
  document.getElementById('nano-title').textContent=path;
  document.getElementById('nano-fname').textContent=path;
  document.getElementById('nano-modified').textContent='';
  const lines=content.split('\n').length;
  document.getElementById('nano-msg-text').textContent=` [ Wrote ${lines} line${lines!==1?'s':''} ]`;
  return true;
}
function updateNanoStatus(){
  const ed=document.getElementById('nano-editor');
  const val=ed.value;
  const pos=ed.selectionStart;
  const before=val.substring(0,pos);
  const row=before.split('\n').length;
  const lastNL=before.lastIndexOf('\n');
  const col=pos-lastNL;
  const totalRows=val.split('\n').length;
  document.getElementById('nano-pos').textContent=`Col ${col}, Row ${row}/${totalRows}`;
  const modified=val!==nanoOrigContent;
  document.getElementById('nano-modified').textContent=modified?' [ Modified ]':'';
}

document.getElementById('nano-editor').addEventListener('keyup',updateNanoStatus);
document.getElementById('nano-editor').addEventListener('click',updateNanoStatus);

document.getElementById('nano-editor').addEventListener('keydown',e=>{
  if(nanoState==='PROMPT_NAME'||nanoState==='PROMPT_SAVE'){e.preventDefault();return;}
  if(nanoState==='SEARCH'){e.preventDefault();return;}

  // ^G help
  if(e.ctrlKey&&(e.key==='g'||e.key==='G')){
    e.preventDefault();
    const hb=document.getElementById('nano-help-body');
    hb.innerHTML=nanoHelpText.map(r=>`<div class="hrow"><span class="hkey">${esc(r.k)}</span><span>${esc(r.v)}</span></div>`).join('');
    document.getElementById('nano-help').style.display='flex';
    document.getElementById('nano-help').style.flexDirection='column';
    return;
  }
  // ^O write
  if(e.ctrlKey&&(e.key==='o'||e.key==='O')){
    e.preventDefault();
    nanoState='PROMPT_NAME';
    document.getElementById('nano-msg-text').textContent=' File Name to Write: ';
    const mi=document.getElementById('nano-msg-input');
    mi.style.display='inline-block';mi.value=nanoFilePath;mi.focus();
    return;
  }
  // ^X exit
  if(e.ctrlKey&&(e.key==='x'||e.key==='X')){
    e.preventDefault();
    const cur=document.getElementById('nano-editor').value;
    if(cur!==nanoOrigContent){
      nanoState='PROMPT_SAVE';
      document.getElementById('nano-msg-text').textContent=' Save modified buffer? (Y)es (N)o ^C Cancel';
    }else{closeNano();}
    return;
  }
  // ^K cut line
  if(e.ctrlKey&&(e.key==='k'||e.key==='K')){
    e.preventDefault();
    const ed=document.getElementById('nano-editor');
    const val=ed.value;const pos=ed.selectionStart;
    const lineStart=val.lastIndexOf('\n',pos-1)+1;
    const lineEnd=val.indexOf('\n',pos);
    const end=lineEnd===-1?val.length:lineEnd+1;
    nanoClipboard.push(val.substring(lineStart,end));
    ed.value=val.substring(0,lineStart)+val.substring(end);
    ed.selectionStart=ed.selectionEnd=lineStart;
    document.getElementById('nano-msg-text').textContent='';
    updateNanoStatus();
    return;
  }
  // ^U uncut/paste
  if(e.ctrlKey&&(e.key==='u'||e.key==='U')){
    e.preventDefault();
    if(!nanoClipboard.length)return;
    const ed=document.getElementById('nano-editor');
    const val=ed.value;const pos=ed.selectionStart;
    const paste=nanoClipboard.join('');
    ed.value=val.substring(0,pos)+paste+val.substring(pos);
    ed.selectionStart=ed.selectionEnd=pos+paste.length;
    document.getElementById('nano-msg-text').textContent='';
    updateNanoStatus();
    return;
  }
  // ^W search
  if(e.ctrlKey&&(e.key==='w'||e.key==='W')){
    e.preventDefault();
    nanoState='SEARCH';
    const prompt=nanoSearchTerm?` Search [${nanoSearchTerm}]: `:' Search: ';
    document.getElementById('nano-msg-text').textContent=prompt;
    const mi=document.getElementById('nano-msg-input');
    mi.style.display='inline-block';mi.value='';mi.focus();
    return;
  }
  // ^C show position
  if(e.ctrlKey&&e.key==='c'){
    e.preventDefault();
    updateNanoStatus();
    return;
  }
});

document.getElementById('nano-msg-input').addEventListener('keydown',e=>{

// ─── LESS ─────────────────────────────────────────────────────
function openLess(content,filename){
  inLess=true;lessFile=filename||'';lessSearchTerm='';lessSearchMatches=[];
  lessLines=content.split('\n');
  const contentEl=document.getElementById('less-content');
  contentEl.innerHTML=lessLines.map((l,i)=>`<span id="ll${i}">${esc(l)||'&nbsp;'}</span>\n`).join('');
  document.getElementById('less-file').textContent=filename?`${filename}`:'(pipe)';
  document.getElementById('less-view').style.display='flex';
  document.getElementById('less-view').style.flexDirection='column';
  document.getElementById('less-pct').textContent='100%';
  contentEl.scrollTop=0;
  updateLessPct();
  return{out:''};
}
function closeLess(){
  inLess=false;
  document.getElementById('less-view').style.display='none';
  document.getElementById('less-search-bar').style.display='none';
  document.getElementById('cmd-input').focus();
}
function updateLessPct(){
  const el=document.getElementById('less-content');
  const pct=el.scrollHeight<=el.clientHeight?100:Math.round((el.scrollTop+el.clientHeight)/el.scrollHeight*100);
  document.getElementById('less-pct').textContent=`${pct}%`;
}

document.addEventListener('keydown',e=>{
  if(!inLess)return;
  const el=document.getElementById('less-content');
  const sb=document.getElementById('less-search-bar');
  if(sb.style.display!=='none'){return;}
  e.preventDefault();
  const k=e.key;
  if(k==='q'||k==='Q'){closeLess();}
  else if(k==='ArrowDown'||k==='j')el.scrollTop+=20;
  else if(k==='ArrowUp'||k==='k')el.scrollTop-=20;
  else if(k==='PageDown'||k===' ')el.scrollTop+=el.clientHeight;
  else if(k==='PageUp'||k==='b')el.scrollTop-=el.clientHeight;
  else if(k==='Home'||k==='g')el.scrollTop=0;
  else if(k==='End'||k==='G')el.scrollTop=el.scrollHeight;
  else if(k==='/')startLessSearch();
  else if(k==='n')lessNextMatch(1);
  else if(k==='N')lessNextMatch(-1);
  updateLessPct();
});

function startLessSearch(){
  const sb=document.getElementById('less-search-bar');
  sb.style.display='block';
  const inp=document.getElementById('less-search-input');
  inp.value='';inp.focus();
}
document.getElementById('less-search-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const term=e.target.value;
    if(term){
      lessSearchTerm=term;
      buildLessMatches();
      lessMatchIdx=-1;
      lessNextMatch(1);
    }
    document.getElementById('less-search-bar').style.display='none';
    document.getElementById('less-search-input').blur();
  }else if(e.key==='Escape'){
    document.getElementById('less-search-bar').style.display='none';
  }
});
function buildLessMatches(){
  lessSearchMatches=[];
  const re=new RegExp(lessSearchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  lessLines.forEach((l,i)=>{if(re.test(l))lessSearchMatches.push(i);});
  const el=document.getElementById('less-content');
  el.querySelectorAll('.ls-highlight').forEach(s=>{s.outerHTML=s.textContent;});
  lessLines.forEach((l,i)=>{
    const span=document.getElementById('ll'+i);
    if(span&&re.test(l)){
      span.innerHTML=esc(l).replace(new RegExp(esc(lessSearchTerm),'gi'),m=>`<span style="background:var(--yellow);color:#000">${m}</span>`);
    }
  });
}
function lessNextMatch(dir){
  if(!lessSearchMatches.length)return;
  lessMatchIdx=(lessMatchIdx+dir+lessSearchMatches.length)%lessSearchMatches.length;
  const lineIdx=lessSearchMatches[lessMatchIdx];
  const span=document.getElementById('ll'+lineIdx);
  if(span)span.scrollIntoView({block:'center'});
}

// ─── COMMANDS ─────────────────────────────────────────────────
const CMD={};

CMD.pwd=({args})=>({out:normPath(cwd)});

CMD.cd=({args})=>{
  let target=args[0]||env.HOME;
  if(target==='-'){target=env.OLDPWD||env.HOME;}
  const resolved=normPath(target);
  const node=getNode(resolved);
  if(!node)return{err:`-bash: cd: ${args[0]}: No such file or directory`};
  if(node.type!=='d')return{err:`-bash: cd: ${args[0]}: Not a directory`};
  if(resolved==='/root')return{err:`-bash: cd: /root: Permission denied`};
  env.OLDPWD=cwd;
  cwd=resolved;updatePrompt();
  return{out:''};
};

CMD.ls=({args})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const paths=args.filter(a=>!a.startsWith('-'));
  const showAll=flags.some(f=>f.includes('a'));
  const longFmt=flags.some(f=>f.includes('l'));
  const humanSz=flags.some(f=>f.includes('h'));
  const showAlmostAll=flags.some(f=>f.includes('A'));
  const reverse=flags.some(f=>f.includes('r'));
  const sortTime=flags.some(f=>f.includes('t'));
  const noSort=flags.some(f=>f.includes('U'));
  const oneline=flags.some(f=>f.includes('1'));
  const target=paths[0]?normPath(paths[0]):normPath(cwd);
  const node=getNode(target);
  if(!node)return{err:`ls: cannot access '${paths[0]||cwd}': No such file or directory`};
  if(node.type==='f')return{html:`<span class="ls-f">${esc(basename(target))}</span>`};
  let entries=Object.entries(node.children);
  if(!showAll&&!showAlmostAll)entries=entries.filter(([n])=>!n.startsWith('.'));
  if(!noSort)entries.sort((a,b)=>{
    if(a[1].type!==b[1].type)return a[1].type==='d'?-1:1;
    return a[0].localeCompare(b[0]);
  });
  if(reverse)entries.reverse();
  const now=new Date();
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ds=`${months[now.getMonth()]} ${String(now.getDate()).padStart(2)} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(!longFmt&&!oneline){
    const parts=[];
    if(showAll){parts.push(`<span class="ls-d">./</span>`);parts.push(`<span class="ls-d">../</span>`);}
    entries.forEach(([name,nd])=>{
      const cls=nd.type==='d'?'ls-d':'ls-f';
      const suffix=nd.type==='d'?'/':'';
      parts.push(`<span class="${cls}">${esc(name)}${suffix}</span>`);
    });
    return{html:parts.join('  ')};
  }
  const lines=[];
  if(longFmt){
    let total=0;entries.forEach(([,nd])=>total+=nd.type==='f'?Math.ceil((nd.content||'').length/512):0);
    lines.push(`total ${total}`);
  }
  if(showAll&&longFmt){
    lines.push(`<span class="ls-d">drwxr-xr-x  2 analyst  analyst        40 ${ds} ./</span>`);
    lines.push(`<span class="ls-d">drwxr-xr-x  2 analyst  analyst        40 ${ds} ../</span>`);
  }
  for(const[name,nd]of entries){
    const isDir=nd.type==='d';
    const p=String(nd.perms||(isDir?'755':'644'));
    let pstr=isDir?'d':'-';
    for(let i=0;i<3;i++){
       let val=parseInt(p[i]||'0');
       pstr+=(val&4?'r':'-')+(val&2?'w':'-')+(val&1?'x':'-');
    }
    const sz=isDir?'     0':(humanSz?humanSize(fileSize(nd.content||'')).padStart(6):String(fileSize(nd.content||'')).padStart(6));
    const cls=isDir?'ls-d':(p==='755'||p.includes('x')?'ls-x':'ls-f');
    const suffix=isDir?'/':'';
    const owner=nd.owner||(target.startsWith('/home/analyst')||target==='/home'?'analyst':'root');
    const group=nd.group||owner;
    if(oneline&&!longFmt){lines.push(`<span class="${cls}">${esc(name)}${suffix}</span>`);}
    else{lines.push(`<span class="${cls}">${esc(pstr)}  1 ${owner.padEnd(8)} ${group.padEnd(8)} ${sz} ${ds} ${esc(name)}${suffix}</span>`);}
  }
  return{html:lines.join('\n')};
};

CMD.cat=({args,stdin})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const files=args.filter(a=>!a.startsWith('-'));
  const showNumber=flags.some(f=>f.includes('n'));
  const showNonprint=flags.some(f=>f.includes('v'));
  if(stdin!==undefined&&!files.length){
    if(showNumber){
      return{out:stdin.split('\n').map((l,i)=>`${String(i+1).padStart(6)}\t${l}`).join('\n')};
    }
    return{out:stdin};
  }
  if(!files.length)return{err:'cat: missing operand'};
  const results=[];
  for(const a of files){
    const p=normPath(a);const node=getNode(p);
    if(!node){results.push({err:`cat: ${a}: No such file or directory`});continue;}
    if(node.type==='d'){results.push({err:`cat: ${a}: Is a directory`});continue;}
    const content=node.content||'';
    if(showNumber){
      results.push({out:content.split('\n').map((l,i)=>`${String(i+1).padStart(6)}\t${l}`).join('\n')});
    }else{results.push({out:content});}
  }
  return results;
};

CMD.nano=({args})=>{
  if(!args.length)return{err:'nano: missing file operand'};
  return openNano(args[0]);
};

CMD.less=({args,stdin})=>{
  if(stdin!==undefined&&!args.length){return openLess(stdin,'');}
  if(!args.length)return{err:'less: missing filename (use --help for information)'};
  const p=normPath(args[0]);const node=getNode(p);
  if(!node)return{err:`${args[0]}: No such file or directory`};
  if(node.type==='d')return{err:`${args[0]}: Is a directory`};
  return openLess(node.content||'',args[0]);
};
CMD.more=CMD.less;

CMD.touch=({args})=>{
  if(!args.length)return{err:'touch: missing file operand'};
  const results=[];
  for(const a of args){
    const p=normPath(a);
    if(!getNode(p)){
      const par=getNode(getParent(p));
      if(!par||par.type!=='d'){results.push({err:`touch: cannot touch '${a}': No such file or directory`});continue;}
      setNode(p,{type:'f',content:'',perms:'644'});
    }
  }
  return results.length?results:{out:''};
};

CMD.mkdir=({args})=>{
  if(!args.length)return{err:'mkdir: missing operand'};
  const pflag=args.includes('-p');
  const targets=args.filter(a=>!a.startsWith('-'));
  const results=[];
  for(const a of targets){
    const p=normPath(a);
    if(getNode(p)){if(!pflag)results.push({err:`mkdir: cannot create directory '${a}': File exists`});continue;}
    if(pflag){
      const parts=p.split('/').filter(Boolean);
      let cur='/';
      for(const pt of parts){
        cur=(cur==='/'?'/':cur+'/')+pt;
        if(!getNode(cur))setNode(cur,{type:'d',children:{},perms:'755'});
      }
    }else{
      const par=getNode(getParent(p));
      if(!par||par.type!=='d'){results.push({err:`mkdir: cannot create directory '${a}': No such file or directory`});continue;}
      setNode(p,{type:'d',children:{},perms:'755'});
    }
  }
  return results.length?results:{out:''};
};

CMD.rm=({args})=>{
  if(!args.length)return{err:'rm: missing operand\nTry \'rm --help\' for more information.'};
  const flags=args.filter(a=>a.startsWith('-'));
  const rf=flags.some(f=>f.includes('r')||f.includes('f'));
  const force=flags.some(f=>f.includes('f'));
  const targets=args.filter(a=>!a.startsWith('-'));
  const results=[];
  for(const a of targets){
    const p=normPath(a);const node=getNode(p);
    if(!node){if(!force)results.push({err:`rm: cannot remove '${a}': No such file or directory`});continue;}
    if(node.type==='d'&&!rf){results.push({err:`rm: cannot remove '${a}': Is a directory`});continue;}
    deleteNode(p);
  }
  return results.length?results:{out:''};
};

CMD.rmdir=({args})=>{
  if(!args.length)return{err:'rmdir: missing operand'};
  const results=[];
  for(const a of args.filter(a=>!a.startsWith('-'))){
    const p=normPath(a);const node=getNode(p);
    if(!node)return{err:`rmdir: failed to remove '${a}': No such file or directory`};
    if(node.type!=='d')return{err:`rmdir: failed to remove '${a}': Not a directory`};
    if(Object.keys(node.children).length>0)return{err:`rmdir: failed to remove '${a}': Directory not empty`};
    deleteNode(p);
  }
  return results.length?results:{out:''};
};

CMD.cp=({args})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const targets=args.filter(a=>!a.startsWith('-'));
  if(targets.length<2)return{err:'cp: missing destination file operand'};
  const recursive=flags.some(f=>f.includes('r')||f.includes('R'));
  const src=normPath(targets[0]);
  let dst=normPath(targets[1]);
  const srcNode=getNode(src);
  if(!srcNode)return{err:`cp: cannot stat '${targets[0]}': No such file or directory`};
  if(srcNode.type==='d'&&!recursive)return{err:`cp: -r not specified; omitting directory '${targets[0]}'`};
  const dstNode=getNode(dst);
  if(dstNode&&dstNode.type==='d')dst=dst+'/'+basename(src);
  setNode(dst,JSON.parse(JSON.stringify(srcNode)));
  return{out:''};
};

CMD.mv=({args})=>{
  const targets=args.filter(a=>!a.startsWith('-'));
  if(targets.length<2)return{err:'mv: missing destination file operand'};
  const src=normPath(targets[0]);
  let dst=normPath(targets[1]);
  const srcNode=getNode(src);
  if(!srcNode)return{err:`mv: cannot stat '${targets[0]}': No such file or directory`};
  const dstNode=getNode(dst);
  if(dstNode&&dstNode.type==='d')dst=dst+'/'+basename(src);
  setNode(dst,JSON.parse(JSON.stringify(srcNode)));
  deleteNode(src);
  return{out:''};
};

CMD.ln=({args})=>{
  const symbolic=args.includes('-s');
  const targets=args.filter(a=>!a.startsWith('-'));
  if(targets.length<2)return{err:'ln: missing file operand'};
  const src=normPath(targets[0]);
  const dst=normPath(targets[1]);
  const srcNode=getNode(src);
  if(!srcNode)return{err:`ln: failed to create${symbolic?' symbolic':''} link '${targets[1]}': No such file or directory`};
  setNode(dst,{type:'f',content:srcNode.content||'',perms:srcNode.perms||'644',symlink:symbolic?src:null});
  return{out:''};
};

CMD.echo=({args})=>{
  const noNewline=args[0]==='-n';
  const enableEscape=args[0]==='-e';
  let parts=(noNewline||enableEscape)?args.slice(1):args;
  let out=parts.join(' ');
  if(enableEscape){out=out.replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\r/g,'\r').replace(/\\\\/g,'\\');}
  return{out};
};

CMD.printf=({args})=>{
  if(!args.length)return{out:''};
  let fmt=args[0];const fargs=args.slice(1);
  let i=0;
  const out=fmt.replace(/%s|%d|%i|%f|%q/g,m=>{
    const a=fargs[i++]||'';
    if(m==='%d'||m==='%i')return parseInt(a)||0;
    if(m==='%f')return parseFloat(a)||0;
    return a;
  }).replace(/\\n/g,'\n').replace(/\\t/g,'\t');
  return{out};
};

CMD.grep=({args,stdin})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const others=args.filter(a=>!a.startsWith('-'));
  const ignoreCase=flags.some(f=>f.includes('i'));
  const invertMatch=flags.some(f=>f.includes('v'));
  const lineNum=flags.some(f=>f.includes('n'));
  const countOnly=flags.some(f=>f.includes('c'));
  const recursive=flags.some(f=>f.includes('r')||f.includes('R'));
  const wordMatch=flags.some(f=>f.includes('w'));
  const quiet=flags.some(f=>f.includes('q')||f.includes('s'));
  const files=others.slice(1);
  if(!others.length)return{err:'grep: usage: grep [OPTION]... PATTERN [FILE]...'};
  const pattern=others[0];
  let regexStr=pattern;
  if(wordMatch)regexStr=`\\b${pattern}\\b`;
  let regex;
  try{regex=new RegExp(regexStr,ignoreCase?'i':'');}
  catch(e){return{err:`grep: invalid regular expression: ${pattern}`};}
  function grepLines(text,label){
    const lines=text.split('\n');const matched=[];
    lines.forEach((l,idx)=>{
      const m=regex.test(l);
      if((!invertMatch&&m)||(invertMatch&&!m)){
        let out='';
        if(label)out+=`${label}:`;
        if(lineNum)out+=`${idx+1}:`;
        out+=l;matched.push(out);
      }
    });
    return matched;
  }
  if(stdin!==undefined&&!files.length){
    const matched=grepLines(stdin,null);
    if(quiet)return{exit:matched.length>0?0:1,out:''};
    if(countOnly)return{out:String(matched.length)};
    return{out:matched.join('\n')};
  }
  if(recursive){
    const root=files[0]?normPath(files[0]):normPath(cwd);
    const results=[];
    function walk(p,node){
      if(node.type==='f'){const m=grepLines(node.content||'',p);results.push(...m);}
      else if(node.type==='d'){for(const[n,c]of Object.entries(node.children))walk(p+'/'+n,c);}
    }
    const rootNode=getNode(root);
    if(!rootNode)return{err:`grep: ${files[0]}: No such file or directory`};
    walk(root,rootNode);
    if(countOnly)return{out:String(results.length)};
    return{out:results.join('\n')};
  }
  if(!files.length)return{err:'grep: no file operand (or use with pipe / -r)'};
  const results=[];const multiFile=files.length>1;
  for(const f of files){
    const p=normPath(f);const node=getNode(p);
    if(!node){results.push({err:`grep: ${f}: No such file or directory`});continue;}
    if(node.type==='d'){results.push({err:`grep: ${f}: Is a directory`});continue;}
    const matched=grepLines(node.content||'',multiFile?f:null);
    if(countOnly)results.push({out:String(matched.length)});
    else matched.forEach(l=>results.push({out:l}));
  }
  return results.length?results:{out:''};
};

CMD.find=({args})=>{
  const startArg=args[0]&&!args[0].startsWith('-')?args[0]:'.';
  const startPath=normPath(startArg);
  const startNode=getNode(startPath);
  if(!startNode)return{err:`find: '${startArg}': No such file or directory`};
  let namePattern=null,typeFilter=null,maxDepth=Infinity,execCmd=null,newer=null,empty=false;
  for(let i=0;i<args.length;i++){
    if(args[i]==='-name'&&args[i+1])namePattern=args[++i];
    if(args[i]==='-iname'&&args[i+1]){namePattern=args[++i];}
    if(args[i]==='-type'&&args[i+1])typeFilter=args[++i];
    if(args[i]==='-maxdepth'&&args[i+1])maxDepth=parseInt(args[++i]);
    if(args[i]==='-empty')empty=true;
  }
  const results=[];
  function walk(path,node,depth){
    if(depth>maxDepth)return;
    const name=basename(path);
    let match=true;
    if(namePattern){
      const re=new RegExp('^'+namePattern.replace(/\./g,'\\.').replace(/\*/g,'.*').replace(/\?/g,'.')+'$','i');
      if(!re.test(name))match=false;
    }
    if(typeFilter){if(typeFilter==='f'&&node.type!=='f')match=false;if(typeFilter==='d'&&node.type!=='d')match=false;}
    if(empty){if(node.type==='f'&&(node.content||'').length>0)match=false;if(node.type==='d'&&Object.keys(node.children||{}).length>0)match=false;}
    if(match)results.push(path);
    if(node.type==='d'){for(const[n,c]of Object.entries(node.children))walk(path+'/'+n,c,depth+1);}
  }
  walk(startPath,startNode,0);
  return{out:results.join('\n')};
};

CMD.wc=({args,stdin})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const files=args.filter(a=>!a.startsWith('-'));
  const showL=!flags.length||flags.some(f=>f.includes('l'));
  const showW=!flags.length||flags.some(f=>f.includes('w'));
  const showC=!flags.length||flags.some(f=>f.includes('c'));
  function count(text){
    const lines=(text.match(/\n/g)||[]).length;
    const words=text.trim()?text.trim().split(/\s+/).length:0;
    const chars=text.length;
    return{lines,words,chars};
  }
  function fmt(c,label){
    const parts=[];
    if(showL)parts.push(String(c.lines).padStart(7));
    if(showW)parts.push(String(c.words).padStart(7));
    if(showC)parts.push(String(c.chars).padStart(7));
    if(label)parts.push(' '+label);
    return parts.join('');
  }
  if(stdin!==undefined&&!files.length)return{out:fmt(count(stdin))};
  if(!files.length)return{err:'wc: missing file operand'};
  const results=[];let totL=0,totW=0,totC=0;
  for(const f of files){
    const p=normPath(f);const node=getNode(p);
    if(!node){results.push({err:`wc: ${f}: No such file or directory`});continue;}
    if(node.type==='d'){results.push({err:`wc: ${f}: Is a directory`});continue;}
    const c=count(node.content||'');
    totL+=c.lines;totW+=c.words;totC+=c.chars;
    results.push({out:fmt(c,f)});
  }
  if(files.length>1)results.push({out:fmt({lines:totL,words:totW,chars:totC},'total')});
  return results;
};

CMD.head=({args,stdin})=>{
  const nFlag=args.findIndex(a=>a==='-n');
  let n=10;
  const others=args.filter(a=>!a.startsWith('-'));
  if(nFlag!==-1&&args[nFlag+1])n=parseInt(args[nFlag+1]);
  else{const nf=args.find(a=>/^-\d+$/.test(a));if(nf)n=parseInt(nf.slice(1));}
  if(stdin!==undefined&&!others.length)return{out:stdin.split('\n').slice(0,n).join('\n')};
  if(!others.length)return{err:'head: missing file operand'};
  const results=[];
  for(const f of others){
    const node=getNode(normPath(f));
    if(!node)return{err:`head: cannot open '${f}': No such file or directory`};
    if(node.type==='d')return{err:`head: error reading '${f}': Is a directory`};
    results.push({out:(node.content||'').split('\n').slice(0,n).join('\n')});
  }
  return results.length===1?results[0]:results;
};

CMD.tail=({args,stdin})=>{

  if(stdin!==undefined&&!others.length){const lines=stdin.split('\n');return{out:lines.slice(Math.max(0,lines.length-n)).join('\n')};}
  if(!others.length)return{err:'tail: missing file operand'};
  const results=[];

};

CMD.sort=({args,stdin})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const files=args.filter(a=>!a.startsWith('-'));
  const reverse=flags.some(f=>f.includes('r'));
  const unique=flags.some(f=>f.includes('u'));
  const numeric=flags.some(f=>f.includes('n'));
  const kFlag=args.findIndex(a=>a==='-k');
  const key=kFlag!==-1&&args[kFlag+1]?parseInt(args[kFlag+1])-1:null;
  let text=stdin!==undefined?stdin:null;
  if(!text&&files.length){const node=getNode(normPath(files[0]));if(!node)return{err:`sort: cannot read: No such file or directory`};text=node.content||'';}
  if(text===null)return{err:'sort: missing operand'};
  let lines=text.split('\n').filter(l=>l!=='');
  if(unique)lines=[...new Set(lines)];
  lines.sort((a,b)=>{
    const av=key!==null?(a.split(/\s+/)[key]||''):a;
    const bv=key!==null?(b.split(/\s+/)[key]||''):b;
    if(numeric){return parseFloat(av)-parseFloat(bv);}
    return av.localeCompare(bv);
  });
  if(reverse)lines.reverse();
  return{out:lines.join('\n')};
};

CMD.uniq=({args,stdin})=>{
  const files=args.filter(a=>!a.startsWith('-'));
  const countFlag=args.some(a=>a.includes('c'));
  const dupFlag=args.some(a=>a.includes('d'));
  let text=stdin!==undefined?stdin:null;
  if(!text&&files.length){const node=getNode(normPath(files[0]));if(!node)return{err:`uniq: ${files[0]}: No such file or directory`};text=node.content||'';}
  if(text===null)return{err:'uniq: missing operand'};
  const lines=text.split('\n');const result=[];
  for(let i=0;i<lines.length;i++){
    if(i===0||lines[i]!==lines[i-1]){
      let c=1;
      while(i+c<lines.length&&lines[i+c]===lines[i])c++;
      if(dupFlag&&c<=1){i+=c-1;continue;}
      if(countFlag)result.push(`${String(c).padStart(6)} ${lines[i]}`);
      else result.push(lines[i]);
      i+=c-1;
    }
  }
  return{out:result.join('\n')};
};

CMD.cut=({args,stdin})=>{
  const dIdx=args.indexOf('-d');const fIdx=args.indexOf('-f');
  const delim=dIdx!==-1?(args[dIdx+1]||'\t'):'\t';
  const fieldStr=fIdx!==-1?args[fIdx+1]:'1';
  const files=args.filter(a=>!a.startsWith('-'));
  let text=stdin!==undefined?stdin:null;
  if(!text&&files.length){const node=getNode(normPath(files[0]));if(!node)return{err:`cut: ${files[0]}: No such file or directory`};text=node.content||'';}
  if(text===null)return{err:'cut: missing operand'};
  const fields=fieldStr.split(',').map(f=>{if(f.includes('-')){const[s,e]=f.split('-');return{s:parseInt(s||1)-1,e:parseInt(e||999)-1};}return{s:parseInt(f)-1,e:parseInt(f)-1};});
  const result=text.split('\n').map(l=>{
    const parts=l.split(delim);
    const out=[];
    fields.forEach(({s,e})=>{for(let i=s;i<=e&&i<parts.length;i++)out.push(parts[i]);});
    return out.join(delim);
  });
  return{out:result.join('\n')};
};

CMD.tr=({args,stdin})=>{
  if(!args.length)return{err:'tr: missing operand'};
  const deleteFlag=args.includes('-d');
  const squeezeFlag=args.includes('-s');
  const others=args.filter(a=>!a.startsWith('-'));
  const text=stdin!==undefined?stdin:'';
  if(deleteFlag){
    const chars=others[0]||'';let out=text;
    for(const c of chars)out=out.split(c).join('');
    return{out};
  }
  if(others.length<2)return{err:'tr: missing operand after first string'};
  const from=others[0],to=others[1];
  let out='';
  for(const c of text){
    const idx=from.indexOf(c);
    out+=idx!==-1&&idx<to.length?to[idx]:c;
  }
  if(squeezeFlag){out=out.replace(/(.)\1+/g,'$1');}
  return{out};
};

CMD.sed=({args,stdin})=>{
  const inplace=args.includes('-i');
  const scriptArgs=args.filter(a=>!a.startsWith('-'));
  if(!scriptArgs.length)return{err:'sed: no script command'};
  const script=scriptArgs[0];
  const files=scriptArgs.slice(1);
  const sMatch=script.match(/^s([^a-zA-Z])(.+)\1(.*)\1([gip]*)$/);
  const dMatch=script.match(/^(\d+)d$/);
  const pMatch=script.match(/^(\d+)?p$/);
  function applySed(text){
    if(sMatch){
      const[,sep,pat,repl,flags]=sMatch;
      const g=flags.includes('g');
      try{const re=new RegExp(pat,g?'g':'');return text.split('\n').map(l=>l.replace(re,repl)).join('\n');}
      catch(e){return text;}
    }
    if(dMatch){
      const n=parseInt(dMatch[1]);
      return text.split('\n').filter((_,i)=>i!==n-1).join('\n');
    }
    if(pMatch){
      const lines=text.split('\n');
      if(pMatch[1]){const n=parseInt(pMatch[1]);return n>0&&n<=lines.length?lines[n-1]:'';}
      return lines.join('\n');
    }
    return text;
  }
  let text=stdin!==undefined?stdin:null;
  if(!text&&files.length){const node=getNode(normPath(files[0]));if(!node)return{err:`sed: cannot open ${files[0]}: No such file or directory`};text=node.content||'';}
  if(text===null)return{err:'sed: missing input'};
  const result=applySed(text);
  if(inplace&&files.length){const node=getNode(normPath(files[0]));if(node)node.content=result;return{out:''};}
  return{out:result};
};

CMD.awk=({args,stdin})=>{
  const fIdx=args.indexOf('-F');
  const sep=fIdx!==-1?(args[fIdx+1]||' '):(args.find(a=>a.startsWith('-F'))||'').slice(2)||' ';
  const scripts=args.filter(a=>!a.startsWith('-'));
  const program=fIdx!==-1?scripts[0]:scripts[0];
  const files=fIdx!==-1?scripts.slice(1):scripts.slice(1);
  if(!program)return{err:'awk: usage: awk program [file ...]'};
  const printMatch=program.match(/^\{print\s+(\$\d+(?:\s*,\s*\$\d+)*)\s*\}$/);
  const printAll=program==='{print}'||program==='{print $0}';
  const condPrint=program.match(/\/(.+?)\/\s*\{print[^}]*\}/);
  let text=stdin!==undefined?stdin:null;
  if(!text&&files.length){const node=getNode(normPath(files[0]));if(!node)return{err:`awk: ${files[0]}: No such file or directory`};text=node.content||'';}
  if(text===null)return{err:'awk: no input'};
  const lines=text.split('\n');
  if(printAll)return{out:text};
  if(printMatch){
    const fields=printMatch[1].split(',').map(f=>parseInt(f.trim().slice(1))-1);
    return{out:lines.map(l=>{const parts=l.split(new RegExp(sep==='\t'?'\t':sep));return fields.map(i=>parts[i]||'').join('\t');}).join('\n')};
  }
  if(condPrint){
    const pat=condPrint[1];const re=new RegExp(pat);
    return{out:lines.filter(l=>re.test(l)).join('\n')};
  }
  const nfMatch=program.match(/\{print NF\}/);
  if(nfMatch)return{out:lines.map(l=>l.split(new RegExp(sep)).length).join('\n')};
  const nrMatch=program.match(/END\s*\{print NR\}/);
  if(nrMatch)return{out:String(lines.length)};
  return{out:text};
};

CMD.diff=({args})=>{
  const targets=args.filter(a=>!a.startsWith('-'));
  if(targets.length<2)return{err:'diff: missing operand after first file'};
  const n1=getNode(normPath(targets[0])),n2=getNode(normPath(targets[1]));
  if(!n1)return{err:`diff: ${targets[0]}: No such file or directory`};
  if(!n2)return{err:`diff: ${targets[1]}: No such file or directory`};
  const a=n1.type==='d'?Object.keys(n1.children):( n1.content||'').split('\n');
  const b=n2.type==='d'?Object.keys(n2.children):(n2.content||'').split('\n');
  if(n1.type==='d')return{out:`Only in ${targets[0]}: ${a.filter(x=>!b.includes(x)).join('\n')}\nOnly in ${targets[1]}: ${b.filter(x=>!a.includes(x)).join('\n')}`};
  const results=[];let i=0,j=0;
  while(i<a.length||j<b.length){
    if(i>=a.length){results.push(`> ${b[j++]}`);}
    else if(j>=b.length){results.push(`< ${a[i++]}`);}
    else if(a[i]===b[j]){i++;j++;}
    else{results.push(`${i+1}c${j+1}`);results.push(`< ${a[i++]}`);results.push('---');results.push(`> ${b[j++]}`);}
  }
  return{out:results.join('\n')};
};

CMD.file=({args})=>{
  if(!args.length)return{err:'file: missing file operand'};
  const results=[];
  for(const a of args){
    const p=normPath(a);const node=getNode(p);
    if(!node){results.push({out:`${a}: cannot open (No such file or directory)`});continue;}
    if(node.type==='d'){results.push({out:`${a}: directory`});continue;}
    const c=node.content||'';let type='ASCII text';
    if(a.endsWith('.sh')||c.startsWith('#!/'))type='Bourne-Again shell script, ASCII text executable';
    else if(a.endsWith('.html')||a.endsWith('.htm'))type='HTML document, ASCII text';
    else if(a.endsWith('.zip'))type='Zip archive data';
    else if(a.endsWith('.conf')||a.endsWith('.cfg'))type='ASCII text, with CRLF line terminators';
    else if(a.endsWith('.log'))type='ASCII text';
    results.push({out:`${a}: ${type}`});
  }
  return results;
};

CMD.du=({args})=>{
  const human=args.some(a=>a.includes('h'));
  const summarize=args.some(a=>a.includes('s'));
  const maxDepth=args.includes('--max-depth')?parseInt(args[args.indexOf('--max-depth')+1]):(args.find(a=>/^--max-depth=/.test(a))?parseInt(args.find(a=>/^--max-depth=/.test(a)).split('=')[1]):Infinity);
  const target=args.filter(a=>!a.startsWith('-'))[0]||'.';
  const p=normPath(target);const node=getNode(p);
  if(!node)return{err:`du: cannot access '${target}': No such file or directory`};
  const lines=[];
  function walk(path,node,depth){
    let size=0;
    if(node.type==='f')size=(node.content||'').length;
    else if(node.type==='d'){for(const[n,c]of Object.entries(node.children))size+=walk(path+'/'+n,c,depth+1);}
    if(!summarize||depth===0){
      const kb=Math.ceil(size/1024)||4;
      const szStr=human?humanSize(size):String(kb);
      if(depth<=maxDepth)lines.push(`${szStr}\t${path}`);
    }
    return size;
  }
  walk(p,node,0);
  return{out:lines.join('\n')};
};

CMD.df=({args})=>{
  const human=args.some(a=>a.includes('h'));
  const sz=human?'7.3G':'7680000';const used=human?'2.1G':'2097152';const avail=human?'5.2G':'5242880';
  return{out:`Filesystem      Size  Used Avail Use% Mounted on\n/dev/sda1       ${sz} ${used}  ${avail}  29% /\ntmpfs           3.9G  1.2M  3.9G   1% /tmp`};
};

CMD.ps=({args})=>{

CMD.kill=({args})=>{
  const sig=args.find(a=>a.startsWith('-'))||'-15';
  const pids=args.filter(a=>!a.startsWith('-'));
  if(!pids.length)return{err:'kill: usage: kill [-s sigspec | -n signum | -sigspec] pid | jobspec ... or kill -l [sigspec]'};
  return{out:pids.map(p=>parseInt(p)===1234?`kill: (1234) - Operation not permitted`:'').filter(Boolean).join('\n')};
};

CMD.chmod=({args})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const recursive=flags.some(f=>f.includes('R'));
  const others=args.filter(a=>!a.startsWith('-'));
  const modeArg=others[0];const targets=others.slice(1);
  if(!modeArg||!targets.length)return{err:'chmod: missing operand'};
  function parseMode(current, modeStr) {
    if (/^[0-7]{3,4}$/.test(modeStr)) return modeStr.slice(-3);
    let perms = parseInt(current, 8);
    const u = (perms >> 6) & 7, g = (perms >> 3) & 7, o = perms & 7;
    let newU = u, newG = g, newO = o;
    const parts = modeStr.split(',');
    for (const p of parts) {
      const match = p.match(/^([ugoa]*)([-+=])([rwx]*)$/);
      if (!match) continue;
      const [, who, op, perm] = match;
      let mask = 0;
      if (perm.includes('r')) mask |= 4;
      if (perm.includes('w')) mask |= 2;
      if (perm.includes('x')) mask |= 1;
      const t = who === '' || who.includes('a') ? ['u', 'g', 'o'] : who.split('');
      if (t.includes('u')) newU = op === '+' ? newU | mask : op === '-' ? newU & ~mask : mask;
      if (t.includes('g')) newG = op === '+' ? newG | mask : op === '-' ? newG & ~mask : mask;
      if (t.includes('o')) newO = op === '+' ? newO | mask : op === '-' ? newO & ~mask : mask;
    }
    return ((newU << 6) | (newG << 3) | newO).toString(8).padStart(3, '0');
  }
  const results=[];
  function applyChmod(p){
    const node=getNode(p);
    if(!node)return{err:`chmod: cannot access '${p}': No such file or directory`};
    const owner=node.owner||(p.startsWith('/home/analyst')?'analyst':'root');
    if(env.USER!=='root'&&env.USER!==owner)return{err:`chmod: changing permissions of '${p}': Operation not permitted`};
    node.perms=parseMode(node.perms||(node.type==='d'?'755':'644'), modeArg);
    if(recursive&&node.type==='d')for(const[n]of Object.entries(node.children))applyChmod(p+'/'+n);
  }
  for(const t of targets){const r=applyChmod(normPath(t));if(r)results.push(r);}
  return results.length?results:{out:''};
};

CMD.chown=({args})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const recursive=flags.some(f=>f.includes('R'));
  const others=args.filter(a=>!a.startsWith('-'));
  const ownerArg=others[0];
  const targets=others.slice(1);
  if(!ownerArg||!targets.length)return{err:'chown: missing operand'};
  let newOwner=ownerArg, newGroup=null;
  if(ownerArg.includes(':')){[newOwner, newGroup] = ownerArg.split(':');}
  const results=[];
  function applyChown(p){
    const node=getNode(p);
    if(!node)return{err:`chown: cannot access '${p}': No such file or directory`};
    if(env.USER!=='root')return{err:`chown: changing ownership of '${p}': Operation not permitted`};
    if(newOwner) node.owner=newOwner;
    if(newGroup) node.group=newGroup;
    if(recursive&&node.type==='d')for(const[n]of Object.entries(node.children))applyChown(p+'/'+n);
  }
  for(const t of targets){const r=applyChown(normPath(t));if(r)results.push(r);}
  return results.length?results:{out:''};
};

CMD.chgrp=({args})=>{
  const flags=args.filter(a=>a.startsWith('-'));
  const recursive=flags.some(f=>f.includes('R'));
  const others=args.filter(a=>!a.startsWith('-'));
  const groupArg=others[0];
  const targets=others.slice(1);
  if(!groupArg||!targets.length)return{err:'chgrp: missing operand'};
  const results=[];
  function applyChgrp(p){
    const node=getNode(p);
    if(!node)return{err:`chgrp: cannot access '${p}': No such file or directory`};
    const owner=node.owner||(p.startsWith('/home/analyst')?'analyst':'root');
    if(env.USER!=='root'&&env.USER!==owner)return{err:`chgrp: changing group of '${p}': Operation not permitted`};
    node.group=groupArg;
    if(recursive&&node.type==='d')for(const[n]of Object.entries(node.children))applyChgrp(p+'/'+n);
  }
  for(const t of targets){const r=applyChgrp(normPath(t));if(r)results.push(r);}
  return results.length?results:{out:''};
};

CMD.tree=({args})=>{
  const target=args[0]?normPath(args[0]):normPath(cwd);
  const node=getNode(target);
  if(!node)return{err:`tree: '${args[0]||cwd}': No such file or directory`};
  const lines=[basename(target)+'/'];let dirs=0,files=0;
  function walk(n,prefix){
    const entries=Object.entries(n.children||{});
    entries.forEach(([name,child],idx)=>{
      const last=idx===entries.length-1;
      const ext=child.type==='d'?'/':'';
      lines.push(prefix+(last?'└── ':'├── ')+name+ext);
      if(child.type==='d'){dirs++;walk(child,prefix+(last?'    ':'│   '));}
      else files++;
    });
  }
  walk(node,'');
  lines.push(`\n${dirs} director${dirs!==1?'ies':'y'}, ${files} file${files!==1?'s':''}`);
  return{out:lines.join('\n')};
};

    let pstr=isDir?'d':'-';
    for(let i=0;i<3;i++){
       let val=parseInt(perms[i]||'0');

// ─── EXECUTOR ─────────────────────────────────────────────────
function execSegment(seg,stdin){
  let cmd=seg.cmd;
  if(aliases[cmd]){
    const aliasToks=tokenize(aliases[cmd]);
    cmd=aliasToks[0];
    seg={cmd,args:[...aliasToks.slice(1),...seg.args]};
  }
  const args=resolveArgs(seg.args);
  const fn=CMD[cmd];
  if(!fn)return{err:`bash: ${cmd}: command not found`};
  try{return fn({args,stdin,rawCmd:seg.cmd});}
  catch(e){return{err:`${cmd}: ${e.message}`};}
}

function flattenResult(result){
  if(!result)return{out:'',err:'',html:'',exit:0};
  if(Array.isArray(result)){
    let out=[],err=[],html=[],exit=0;
    for(const r of result){const f=flattenResult(r);if(f.out)out.push(f.out);if(f.err)err.push(f.err);if(f.html)html.push(f.html);exit=f.exit||exit;}
    return{out:out.join('\n'),err:err.join('\n'),html:html.join('\n'),exit};
  }
  return{out:result.out||'',err:result.err||'',html:result.html||'',exit:result.exit||0};
}

function runPipeline(input){
  // Parse redirections
  let redirectFile=null,redirectAppend=false,stderrFile=null;
  input=input.replace(/\s*2>\s*(\S+)/,(m,f)=>{stderrFile=f;return'';});
  input=input.replace(/\s*>>\s*(\S+)/,(m,f)=>{redirectFile=f;redirectAppend=true;return'';});
  input=input.replace(/\s*>\s*(\S+)/,(m,f)=>{redirectFile=f;return'';});

  const segments=input.split('|').map(s=>s.trim()).filter(Boolean).map(s=>{const t=tokenize(s);return{cmd:t[0]||'',args:t.slice(1)};});
  if(!segments.length||!segments[0].cmd)return;

  let stdin=undefined;
  let lastResult=null;

  for(let i=0;i<segments.length;i++){
    const seg=segments[i];
    if(!seg.cmd)continue;
    const raw=execSegment(seg,stdin);
    lastResult=raw;
    if(i<segments.length-1){
      const flat=flattenResult(raw);
      if(flat.err){printText(flat.err,'le');return;}
      stdin=flat.out;
    }
  }

  if(lastResult!==null){
    const flat=flattenResult(lastResult);
    lastExitCode=flat.exit||0;

    if(redirectFile){
      const p=normPath(redirectFile);
      const par=getNode(getParent(p));
      if(!par||par.type!=='d'){printText(`bash: ${redirectFile}: No such file or directory`,'le');return;}
      const existing=getNode(p);
      const content=redirectAppend&&existing?(existing.content||'')+'\n'+flat.out:flat.out;
      setNode(p,{type:'f',content,perms:'644'});
      if(flat.err)printText(flat.err,'le');
      return;
    }
    if(stderrFile){
      const p=normPath(stderrFile);setNode(p,{type:'f',content:flat.err,perms:'644'});
    }
    if(flat.err)printText(flat.err,'le');
    if(flat.html){
      const d=document.createElement('div');d.className='line lo';d.innerHTML=flat.html;
      outEl.appendChild(d);outEl.scrollTop=outEl.scrollHeight;
    }else if(flat.out!==undefined&&flat.out!==null&&flat.out!==''){
      printText(flat.out);
    }
  }
}

function handleInput(raw){
  if(inNano||inLess)return;
  const input=raw.trim();
  printPromptEcho(raw);
  if(!input)return;
  if(input==='exit'||input==='logout'){printText('logout');return;}
  if(cmdHistory[cmdHistory.length-1]!==input)cmdHistory.push(input);
  histIdx=-1;

  // Handle && and || chaining
  let cmds=[{cmd:input,cond:null}];
  const chainRe=/(.+?)\s*(&&|\|\|)\s*/g;
  let m;const parts=[];let last=0;
  // simple split approach
  const splitChain=(s)=>{
    const result=[];let cur='';let i=0;
    while(i<s.length){
      if(s[i]==='&'&&s[i+1]==='&'){result.push({cmd:cur.trim(),op:'&&'});cur='';i+=2;}
      else if(s[i]==='|'&&s[i+1]==='|'){result.push({cmd:cur.trim(),op:'||'});cur='';i+=2;}
      else cur+=s[i++];
    }
    if(cur.trim())result.push({cmd:cur.trim(),op:null});
    return result;
  };

  const chain=splitChain(input);
  let prevExit=0;
  for(const{cmd,op}of chain){
    if(op===null||prevExit===0){
      // split by semicolons
      const subCmds=cmd.split(';').map(s=>s.trim()).filter(Boolean);
      for(const sc of subCmds)runPipeline(sc);
      prevExit=lastExitCode;
    }else if(op==='||'&&prevExit!==0){
      const subCmds=cmd.split(';').map(s=>s.trim()).filter(Boolean);
      for(const sc of subCmds)runPipeline(sc);
      prevExit=lastExitCode;
    }
  }
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────
const acEl=document.getElementById('autocomplete');

function getCompletions(val){
  const tokens=tokenize(val);
  const isCmd=tokens.length===0||(tokens.length===1&&!val.endsWith(' '));
  if(isCmd){
    const prefix=tokens[0]||'';
    const cmdList=[...Object.keys(CMD),...Object.keys(aliases)].filter((c,i,a)=>a.indexOf(c)===i);
    return cmdList.filter(c=>c.startsWith(prefix)&&c!=='[').sort().map(c=>({label:c,type:'cmd'}));
  }
  const lastToken=val.endsWith(' ')?'':(tokens[tokens.length-1]||'');
  const lastSlash=lastToken.lastIndexOf('/');
  const dirPart=lastSlash>=0?lastToken.slice(0,lastSlash+1):'';
  const filePart=lastSlash>=0?lastToken.slice(lastSlash+1):lastToken;
  const dirPath=dirPart?normPath(dirPart):normPath(cwd);
  const dirNode=getNode(dirPath);
  if(!dirNode||dirNode.type!=='d')return[];
  return Object.entries(dirNode.children).filter(([n])=>n.startsWith(filePart)).sort((a,b)=>a[0].localeCompare(b[0])).map(([n,nd])=>({label:(dirPart||'')+n+(nd.type==='d'?'/':''),type:nd.type==='d'?'dir':'file'}));
}

function showAC(list){
  acEl.innerHTML='';
  if(!list.length){acEl.style.display='none';return;}
  list.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='ac-item '+(item.type==='dir'?'ac-d':item.type==='cmd'?'ac-c':'');
    d.textContent=item.label;
    d.addEventListener('mousedown',e=>{e.preventDefault();applyAC(item.label);});
    acEl.appendChild(d);
  });
  const rect=document.getElementById('inputbar').getBoundingClientRect();
  acEl.style.display='block';
  acEl.style.left=rect.left+'px';
  acEl.style.bottom=(window.innerHeight-rect.top+4)+'px';
  acEl.style.top='auto';
}
function hideAC(){acEl.style.display='none';acList=[];acIdx=-1;}

function applyAC(label){
  const inp=document.getElementById('cmd-input');
  const val=inp.value;
  const tokens=tokenize(val);
  const trailingSpace=val.endsWith(' ');
  if(tokens.length===0||(tokens.length===1&&!trailingSpace)){
    inp.value=label+(label.endsWith('/')?'':' ');
  }else{
    const base=trailingSpace?val:(tokens.slice(0,-1).join(' ')+(tokens.length>1?' ':''));
    inp.value=base+label+(label.endsWith('/')?'':' ');
  }
  hideAC();
}

// ─── INPUT HANDLER ────────────────────────────────────────────
const inputEl=document.getElementById('cmd-input');

inputEl.addEventListener('keydown',e=>{
  if(inNano||inLess)return;
  if(e.key==='Enter'){
    hideAC();const val=inputEl.value;inputEl.value='';handleInput(val);return;
  }
  if(e.key==='Tab'){
    e.preventDefault();
    if(acEl.style.display==='none'||!acList.length){
      acList=getCompletions(inputEl.value);
      if(acList.length===1){applyAC(acList[0].label);acList=[];return;}
      if(!acList.length)return;
      acIdx=-1;showAC(acList);
    }else{
      acIdx=(acIdx+1)%acList.length;
      [...acEl.children].forEach((c,i)=>c.classList.toggle('sel',i===acIdx));
      if(acIdx>=0)applyAC(acList[acIdx].label);
    }
    return;
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(acEl.style.display!=='none'&&acList.length){acIdx=(acIdx-1+acList.length)%acList.length;[...acEl.children].forEach((c,i)=>c.classList.toggle('sel',i===acIdx));return;}
    if(histIdx===-1)histIdx=cmdHistory.length;
    if(histIdx>0){histIdx--;inputEl.value=cmdHistory[histIdx];}
    return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(acEl.style.display!=='none'&&acList.length){acIdx=(acIdx+1)%acList.length;[...acEl.children].forEach((c,i)=>c.classList.toggle('sel',i===acIdx));return;}
    if(histIdx===-1)return;histIdx++;
    inputEl.value=histIdx<cmdHistory.length?cmdHistory[histIdx]:'';
    if(histIdx>=cmdHistory.length)histIdx=-1;
    return;
  }
  if(e.key==='Escape'){hideAC();return;}
  if(e.ctrlKey&&e.key==='c'){e.preventDefault();printText('^C','ld');inputEl.value='';histIdx=-1;hideAC();return;}
  if(e.ctrlKey&&e.key==='l'){e.preventDefault();outEl.innerHTML='';return;}
  if(e.ctrlKey&&e.key==='a'){e.preventDefault();inputEl.setSelectionRange(0,0);return;}
  if(e.ctrlKey&&e.key==='e'){e.preventDefault();inputEl.setSelectionRange(inputEl.value.length,inputEl.value.length);return;}
  if(e.ctrlKey&&e.key==='u'){e.preventDefault();const end=inputEl.selectionStart;inputEl.value=inputEl.value.slice(end);inputEl.setSelectionRange(0,0);return;}
  if(e.ctrlKey&&e.key==='w'){e.preventDefault();const pos=inputEl.selectionStart;const before=inputEl.value.slice(0,pos);const trimmed=before.replace(/\s*\S+\s*$/,'');inputEl.value=trimmed+inputEl.value.slice(pos);inputEl.setSelectionRange(trimmed.length,trimmed.length);return;}
  if(e.ctrlKey&&e.key==='k'){e.preventDefault();inputEl.value=inputEl.value.slice(0,inputEl.selectionStart);return;}
  if(acEl.style.display!=='none'&&acIdx!==-1&&e.key==='Enter'){applyAC(acList[acIdx].label);return;}
});

inputEl.addEventListener('input',()=>{if(!inNano&&!inLess)hideAC();});
document.addEventListener('click',e=>{if(!acEl.contains(e.target)&&e.target!==inputEl)hideAC();});
document.addEventListener('keydown',e=>{
  if(!inNano&&!inLess&&document.activeElement!==inputEl&&e.key.length===1&&!e.ctrlKey&&!e.metaKey)inputEl.focus();
});

// ─── PERSISTENCE ──────────────────────────────────────────────
const DB_NAME='bash-trainer-v2',STORE='state',KEY='session';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e);});}
async function saveState(){
  try{const db=await openDB();const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put({fs,cwd,env,cmdHistory,aliases},KEY);}
  catch(e){try{localStorage.setItem(DB_NAME,JSON.stringify({fs,cwd,env,cmdHistory,aliases}));}catch(_){}}
}
async function loadState(){
  try{const db=await openDB();return new Promise(res=>{const tx=db.transaction(STORE,'readonly');const req=tx.objectStore(STORE).get(KEY);req.onsuccess=e=>res(e.target.result||null);req.onerror=()=>res(null);});}
  catch(e){try{const d=localStorage.getItem(DB_NAME);return d?JSON.parse(d):null;}catch(_){return null;}}
}
setInterval(saveState,30000);

// ─── BOOT ─────────────────────────────────────────────────────
async function boot(){
  const saved=await loadState();
  if(saved){fs=saved.fs||fs;cwd=saved.cwd||cwd;env=saved.env||env;cmdHistory=saved.cmdHistory||[];if(saved.aliases)aliases={...aliases,...saved.aliases};}
  updatePrompt();
  const banner=[

    `<span style="color:var(--green)">  ██╔══██╗██╔══██║╚════██║██╔══██║</span>`,
    `<span style="color:var(--green)">  ██████╔╝██║  ██║███████║██║  ██║</span>`,
    `<span style="color:var(--green)">  ╚═════╝ ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝  <span style="color:var(--dim)">trainer v2.0</span></span>`,
    '',
    `<span style="color:var(--dim)">  Ubuntu 22.04.3 LTS — bash 5.1.16 — analyst@bash-trainer</span>`,
    `<span style="color:var(--dim)">  Type <span style="color:var(--white)">help</span> for commands | <span style="color:var(--white)">man [cmd]</span> for details | <span style="color:var(--white)">reset</span> to factory reset</span>`,

}
