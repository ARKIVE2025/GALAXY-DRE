<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRE Flow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{
  --bg:#F4F5F7;--surface:#fff;--panel:#1F2328;
  --pnav:rgba(255,255,255,0.06);--pnav-on:rgba(255,255,255,0.12);
  --t1:#1F2328;--t2:#6B7585;--t3:#9AA3B0;
  --ti:#fff;--ti2:rgba(255,255,255,0.55);--ti3:rgba(255,255,255,0.3);
  --bd:rgba(0,0,0,0.07);--bdi:rgba(255,255,255,0.06);
  --ac:#5B7CDD;--acs:#EEF2FF;
  --ok:#4CAF82;--oks:#EEF9F4;
  --warn:#D4923A;--warns:#FDF4E7;
  --err:#E05C5C;--errs:#FEF0F0;
  --neu:#B0BAC7;--neus:#F1F3F5;
  --hl:#FFF176;
  --hly:rgba(255,220,0,0.55);
  --hlg:rgba(72,199,90,0.42);
  --hlb:rgba(91,124,221,0.38);
  --hlp:rgba(228,30,99,0.3);
  --hlo:rgba(255,140,0,0.45);
  --hlu:rgba(160,40,200,0.32);
  --r1:10px;--r2:16px;--r3:24px;--rp:99px;
  --s1:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --s2:0 4px 16px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);
  --s3:0 20px 48px rgba(0,0,0,0.12),0 8px 20px rgba(0,0,0,0.06);
}
body.dark{
  --bg:#0F1117;--surface:#181C23;--panel:#0A0D12;
  --pnav:rgba(255,255,255,0.05);--pnav-on:rgba(255,255,255,0.1);
  --t1:#E8ECF2;--t2:#8A95A3;--t3:#555E6B;
  --ti:#E8ECF2;--ti2:rgba(232,236,242,0.55);--ti3:rgba(232,236,242,0.28);
  --bd:rgba(255,255,255,0.07);--bdi:rgba(255,255,255,0.07);
  --ac:#7B9AE8;--acs:#1A2340;
  --ok:#3DBF7A;--oks:#0F2218;
  --warn:#E0A44A;--warns:#231A0A;
  --err:#E86B6B;--errs:#231010;
  --neu:#3A4250;--neus:#1A1E26;
  --hl:rgba(255,230,0,0.35);
  --hly:rgba(255,220,0,0.38);
  --hlg:rgba(72,199,90,0.3);
  --hlb:rgba(91,124,221,0.3);
  --hlp:rgba(228,30,99,0.25);
  --hlo:rgba(255,140,0,0.32);
  --hlu:rgba(160,40,200,0.28);
  --s1:0 1px 3px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2);
  --s2:0 4px 16px rgba(0,0,0,0.4),0 2px 6px rgba(0,0,0,0.2);
  --s3:0 20px 48px rgba(0,0,0,0.5),0 8px 20px rgba(0,0,0,0.3);
}
body.dark .mov{background:rgba(0,0,0,0.72);}
body.dark .mo{background:var(--surface);color:var(--t1);}
body.dark input, body.dark textarea, body.dark select{color-scheme:dark;}
body.dark .fs option, body.dark .fsel option, body.dark .cmpsel option{background:var(--surface);color:var(--t1);}
body.dark mark.hl{background:rgba(255,230,0,0.4);color:var(--t1);}
body.dark .chcard{background:var(--surface);}
body.dark #tc{background:var(--surface);color:var(--t1);border-color:var(--bd);}
body.dark .topbar{background:var(--surface);}
body.dark .card{background:var(--surface);}
body.dark .cmphead{background:var(--surface);}
body.dark .rtoc{background:var(--surface);}
body.dark .rright{background:var(--surface);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;height:100vh;overflow:hidden;font-size:13px;line-height:1.55;transition:background 0.25s,color 0.25s;}

/* SIDEBAR */
#sb{width:252px;min-width:252px;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}
.sbh{padding:20px 20px 14px;border-bottom:1px solid var(--bdi);}
.sblogo{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.lm{width:30px;height:30px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.sbt{font-size:15px;font-weight:600;color:var(--ti);letter-spacing:-0.015em;}
.sbs{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ti3);margin-top:2px;}
.sbnav{padding:10px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.nsl{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ti3);padding:10px 8px 4px;}
.nb{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r1);background:transparent;border:none;color:var(--ti2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background 0.15s,color 0.15s;text-align:left;width:100%;}
.nb:hover{background:var(--pnav);color:var(--ti);}
.nb.on{background:var(--pnav-on);color:var(--ti);}
.nb svg{opacity:0.6;flex-shrink:0;}
.nb.on svg,.nb:hover svg{opacity:1;}
.nba{margin-left:auto;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ti2);flex-shrink:0;}
.nb:hover .nba,.nb.on .nba{background:rgba(255,255,255,0.18);color:var(--ti);}
.sbf{padding:12px;border-top:1px solid var(--bdi);display:flex;flex-direction:column;gap:6px;}
.divi{height:1px;background:var(--bdi);margin:4px 0;}

/* UPLOAD */
.upz{border:1.5px dashed rgba(255,255,255,0.15);border-radius:var(--r1);padding:12px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;}
.upz:hover,.upz.drag{border-color:var(--ac);background:rgba(91,124,221,0.08);}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--s1);gap:12px;}
.tbt{font-size:15px;font-weight:600;letter-spacing:-0.015em;white-space:nowrap;}
.tbr{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding:22px 26px;}

/* SEARCH */
.sw{position:relative;flex:1;max-width:360px;}
.si{width:100%;padding:8px 12px 8px 34px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);outline:none;transition:border-color 0.15s;}
.si:focus{border-color:var(--ac);background:var(--surface);}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;}
mark.hl{background:var(--hl);border-radius:2px;padding:0 1px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--s1);padding:20px;margin-bottom:18px;transition:box-shadow 0.2s;animation:fu 0.3s cubic-bezier(0.2,0,0,1) both;}
.card:hover{box-shadow:var(--s2);}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ct{font-size:14px;font-weight:600;letter-spacing:-0.01em;}
.ey{font-size:10.5px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.sc2{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;transition:box-shadow 0.2s,transform 0.2s;}
.sc2:hover{box-shadow:var(--s2);transform:translateY(-1px);}
.sv{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:5px;}
.sl{font-size:10.5px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);}
.sc2.ac .sv{color:var(--ac);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity 0.15s,transform 0.1s;white-space:nowrap;}
.btn:hover{opacity:0.88;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.bp{background:var(--panel);color:var(--ti);}
.ba{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(91,124,221,0.3);}
.bs{background:var(--surface);color:var(--t1);border:1px solid var(--bd);}
.bg{background:transparent;color:var(--t2);border:1px dashed var(--bd);}
.bg:hover{background:var(--acs);color:var(--ac);border-color:var(--ac);}
.bsm{padding:5px 10px;font-size:12px;}
.bxs{padding:3px 8px;font-size:11px;}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r1);border:1px solid var(--bd);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--bg);position:sticky;top:0;z-index:1;}
th{padding:10px 12px;text-align:left;font-size:10.5px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--bd);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
tr.sm td{background:var(--warns);}
td[contenteditable]{outline:none;cursor:text;min-width:60px;transition:background 0.15s;}
td[contenteditable]:hover{background:var(--acs);}
td[contenteditable]:focus{background:var(--acs);box-shadow:inset 0 0 0 2px var(--ac);border-radius:4px;}
.cxb{width:36px;}
.dbt{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s,color 0.15s;padding:0;}
.dbt:hover{background:var(--errs);color:var(--err);}

/* TAGS / BADGES */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--rp);font-size:11px;font-weight:500;background:var(--neus);color:var(--t2);margin:1px 2px 1px 0;}
.ta{background:var(--acs);color:var(--ac);}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:var(--rp);font-size:10px;font-weight:600;padding:0 5px;background:var(--acs);color:var(--ac);}

/* FILTERS */
.fr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fs{padding:7px 28px 7px 10px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);cursor:pointer;outline:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B7585' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;}
.fs:focus{border-color:var(--ac);}

/* THREAD MAP */
.tr2{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.tl{width:100px;color:var(--t2);font-size:12px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.tcp{padding:2px 7px;border-radius:var(--rp);font-size:10px;font-weight:500;background:var(--neus);color:var(--t3);font-family:'DM Mono',monospace;border:1px solid var(--bd);}
.tcp.on{background:var(--acs);color:var(--ac);border-color:rgba(91,124,221,0.2);}

/* CHAR / LOC CARDS */
.chcard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:10px;animation:fu 0.25s cubic-bezier(0.2,0,0,1) both;}
.chn{font-size:14px;font-weight:600;margin-bottom:4px;}
.chb{font-size:12px;color:var(--t2);margin-bottom:10px;line-height:1.5;}
.act-t{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.act-r{display:flex;gap:8px;margin-bottom:5px;font-size:12px;}
.act-c{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);background:var(--acs);padding:1px 7px;border-radius:var(--rp);flex-shrink:0;align-self:flex-start;margin-top:1px;}

/* READ VIEW */
#content.read-mode{padding:0;overflow:hidden;display:flex;height:100%;}
.rl{display:flex;width:100%;height:100%;}
.rtoc{width:220px;min-width:220px;border-right:1px solid var(--bd);overflow-y:auto;background:var(--surface);padding:12px 0;flex-shrink:0;}
.rtoc-t{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);padding:8px 16px 6px;}
.ti2b{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:13px;color:var(--t2);transition:background 0.12s;line-height:1.4;}
.ti2b:hover{background:var(--bg);color:var(--t1);}
.ti2b.on{background:var(--acs);color:var(--ac);font-weight:600;}
.ti2b.on .tinum{color:var(--ac);}
.tinum{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);flex-shrink:0;width:24px;}
.rbody{flex:1;overflow-y:auto;padding:40px 56px;}
.rhead{font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
.rmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--bd);}
.rprose{font-size:15px;line-height:1.9;color:var(--t1);font-family:'DM Sans',sans-serif;max-width:680px;word-break:break-word;}
.rnav{display:flex;align-items:center;justify-content:space-between;margin-top:48px;padding-top:20px;border-top:1px solid var(--bd);max-width:680px;}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(31,35,40,0.55);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fi 0.2s ease;}
.mo{background:var(--surface);border-radius:var(--r3);box-shadow:var(--s3);width:520px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:28px;animation:fu 0.3s cubic-bezier(0.2,0,0,1);}
.mot{font-size:17px;font-weight:600;letter-spacing:-0.02em;margin-bottom:4px;}
.mos{font-size:12px;color:var(--t2);margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:block;}
.fi2{width:100%;padding:9px 12px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);outline:none;transition:border-color 0.15s;}
.fi2:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,124,221,0.12);}
textarea.fi2{resize:vertical;min-height:70px;line-height:1.5;}
.fi2[type="password"]{font-family:'DM Mono',monospace;}
.fsel{width:100%;padding:9px 12px;border-radius:var(--r1);border:1px solid var(--bd);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface);color:var(--t1);outline:none;cursor:pointer;}
.fsel:focus{border-color:var(--ac);}
.ae{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.ae input:first-child{width:80px;flex-shrink:0;}
.ae input:last-child{flex:1;}
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.pb{padding:10px 12px;border-radius:var(--r1);border:1.5px solid var(--bd);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:border-color 0.15s;text-align:left;color:var(--t1);}
.pb:hover{border-color:var(--ac);background:var(--acs);}
.pb.on{border-color:var(--ac);background:var(--acs);color:var(--ac);}
.pd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.mof{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);}

/* TOAST */
#tc{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--panel);color:var(--ti);padding:10px 16px;border-radius:var(--r1);font-size:13px;font-weight:500;box-shadow:var(--s3);display:flex;align-items:center;gap:8px;animation:fu 0.3s cubic-bezier(0.2,0,0,1) both;pointer-events:all;min-width:220px;}
.toast.ok::before,.toast.er::before,.toast.in::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.toast.ok::before{background:var(--ok);}
.toast.er::before{background:var(--err);}
.toast.in::before{background:var(--ac);}

/* MISC */
.cr{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{padding:4px 10px;border-radius:var(--rp);font-size:11px;font-weight:500;background:var(--neus);color:var(--t2);border:1px solid var(--bd);}
.es{text-align:center;padding:40px 20px;}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--neu);border-radius:99px;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes so{to{opacity:0;transform:translateX(16px);}}

/* ── HIGHLIGHT SYSTEM ── */
/* Color classes used when rendering prose */
.hspan{border-radius:3px;cursor:pointer;transition:box-shadow .15s;}
.hspan:hover{box-shadow:0 0 0 2px rgba(0,0,0,0.18);}
.hc-yellow{background:var(--hly);}
.hc-green{background:var(--hlg);}
.hc-blue{background:var(--hlb);}
.hc-pink{background:var(--hlp);}
.hc-orange{background:var(--hlo);}
.hc-purple{background:var(--hlu);}

/* Floating toolbar */
#hltb{position:fixed;z-index:500;display:none;
  background:#1F2328;border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.28),0 2px 8px rgba(0,0,0,0.18);
  padding:8px 10px;gap:7px;align-items:center;flex-wrap:wrap;min-width:260px;}
#hltb.vis{display:flex;}
.htsw{width:22px;height:22px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.12);
  cursor:pointer;flex-shrink:0;transition:transform .15s,border-color .15s;}
.htsw:hover,.htsw.sel{transform:scale(1.3);border-color:rgba(255,255,255,0.7);}
.htdiv{width:1px;height:20px;background:rgba(255,255,255,0.12);flex-shrink:0;}
#htag{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);
  border-radius:7px;color:#fff;font-size:11px;font-family:'DM Sans',sans-serif;
  padding:5px 9px;width:100px;outline:none;}
#htag::placeholder{color:rgba(255,255,255,0.35);}
#htag:focus{border-color:#5B7CDD;}
#htsave{background:#5B7CDD;color:#fff;border:none;border-radius:7px;
  font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;}
#htsave:hover{background:#4a6ac8;}
#htcancel{background:transparent;color:rgba(255,255,255,0.5);border:none;
  font-size:18px;line-height:1;cursor:pointer;padding:0 3px;}

/* RIGHT PANEL */
.rright{width:270px;min-width:270px;border-left:1px solid var(--bd);
  background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;}
.rrh{padding:12px 14px 10px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rrt{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
.rrsearch{padding:6px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.rrsearch input{width:100%;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);
  background:var(--bg);font-size:11px;font-family:'DM Sans',sans-serif;color:var(--t1);outline:none;}
.rrsearch input:focus{border-color:var(--ac);}
.rrlist{flex:1;overflow-y:auto;padding:8px;}

/* Highlight cards in panel */
.hlcard{background:var(--bg);border:1px solid var(--bd);border-radius:10px;
  padding:10px 12px 10px 14px;margin-bottom:8px;cursor:pointer;
  position:relative;transition:border-color .15s,box-shadow .15s;}
.hlcard:hover{border-color:var(--ac);box-shadow:var(--s2);}
.hlcard-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px;}
.hlcard-txt{font-size:12px;line-height:1.6;color:var(--t1);margin-bottom:5px;word-break:break-word;}
.hlcard-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.hlcard-ch{font-size:10px;font-family:'DM Mono',monospace;color:var(--ac);
  background:var(--acs);padding:1px 7px;border-radius:99px;}
.hlcard-tag{font-size:10px;padding:1px 7px;border-radius:99px;
  background:var(--neus);color:var(--t2);cursor:pointer;}
.hlcard-tag:hover{background:var(--acs);color:var(--ac);}
.hlcard-del{position:absolute;right:5px;top:5px;width:20px;height:20px;
  border-radius:5px;background:transparent;border:none;color:var(--t3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .12s,background .12s;}
.hlcard:hover .hlcard-del{opacity:1;}
.hlcard-del:hover{background:var(--errs);color:var(--err);}


/* COMPARE VIEW */
.cmpgrid{display:grid;grid-template-columns:1fr 1fr;height:100%;overflow:hidden;}
.cmppane{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd);}
.cmppane:last-child{border-right:none;}
.cmphead{padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--surface);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cmpbody{flex:1;overflow-y:auto;padding:24px 28px;font-size:14px;line-height:1.9;
  color:var(--t1);font-family:'DM Sans',sans-serif;word-break:break-word;}
.cmpbody .hspan{display:inline;border-radius:3px;cursor:pointer;padding:1px 0;}
.cmp-legend{display:flex;flex-wrap:wrap;gap:5px;padding:6px 16px;
  border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0;}
.cmp-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;
  color:var(--t2);padding:2px 7px;border-radius:99px;border:1px solid var(--bd);background:var(--surface);}
.cmp-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cmpsel{background:var(--bg);border:1px solid var(--bd);border-radius:8px;
  font-size:12px;font-weight:500;color:var(--t1);padding:5px 26px 5px 10px;
  cursor:pointer;outline:none;font-family:'DM Sans',sans-serif;appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B7585' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;}
.cmpsel:focus{border-color:var(--ac);}

/* Panel toggle button */
.hltoggle{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:8px;background:var(--bg);border:1px solid var(--bd);
  cursor:pointer;font-size:11px;font-weight:500;color:var(--t2);
  transition:background .12s,color .12s,border-color .12s;}
.hltoggle:hover,.hltoggle.on{background:var(--acs);color:var(--ac);border-color:rgba(91,124,221,.3);}

/* TOC highlight dot */
.toc-hldot{font-size:9px;color:var(--ac);margin-left:auto;flex-shrink:0;}
.theme-card{border:2px solid var(--bd);border-radius:var(--r2);padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}

.theme-check{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
</style>
</head>

<script>
// ── STATE ────────────────────────────────────────
var events     = [];
var chars      = [];
var locs       = [];
var highlights = [];  // {id,chIdx,chNum,chHead,start,end,text,color,tags,note,ts}
var curView    = 'dashboard';
var cfilt      = '';
var chfilt     = '';
var srch       = '';
var readIdx    = 0;
var hlPanelOn  = true;
var hlColor    = 'yellow';
var hlPending  = null; // {start,end,text} in raw text offsets
var hlTagFilt  = '';

var HL_SOLID = {yellow:'#FFD700',green:'#48C75A',blue:'#5B7CDD',
                pink:'#E41E63',orange:'#FF8C00',purple:'#A028C8'};
var HL_BG    = {yellow:'rgba(255,220,0,.52)',green:'rgba(72,199,90,.4)',
                blue:'rgba(91,124,221,.36)',  pink:'rgba(228,30,99,.28)',
                orange:'rgba(255,140,0,.42)', purple:'rgba(160,40,200,.3)'};

// ── HELPERS ──────────────────────────────────────
function uid(){ return Math.random().toString(36).slice(2,10); }

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hl(text, term){
  if (!term || !text) return esc(text);
  var escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(String(text)).replace(new RegExp('('+escaped+')','gi'),'<mark class="hl">$1</mark>');
}

function allCharNames(){
  var s = new Set();
  events.forEach(function(e){ if(e.characters) e.characters.split(',').forEach(function(c){ var t=c.trim(); if(t) s.add(t); }); });
  chars.forEach(function(c){ s.add(c.name); });
  return s;
}
function allLocNames(){
  var s = new Set();
  events.forEach(function(e){ if(e.location && e.location.trim()) s.add(e.location.trim()); });
  locs.forEach(function(l){ s.add(l.name); });
  return s;
}
function getChaps(){
  var s = new Set();
  events.forEach(function(e){ if(e.chapter!==undefined && e.chapter!=='') s.add(String(e.chapter).trim()); });
  return s;
}
function readableEvents(){
  return events.filter(function(e){ return e.fullText; });
}
function threadMap(){
  var map = {};
  var allCh = Array.from(getChaps()).sort(function(a,b){ return parseInt(a)-parseInt(b); });
  events.forEach(function(e){
    if (!e.characters) return;
    e.characters.split(',').forEach(function(c){
      var n = c.trim(); if(!n) return;
      if (!map[n]) map[n] = new Set();
      if (e.chapter!==undefined && e.chapter!=='') map[n].add(String(e.chapter).trim());
    });
  });
  chars.forEach(function(ch){
    if (!map[ch.name]) map[ch.name] = new Set();
    if (ch.activity) ch.activity.forEach(function(a){ if(a.chapter) map[ch.name].add(String(a.chapter).trim()); });
  });
  return { map:map, allCh:allCh };
}

// ── SEARCH ───────────────────────────────────────
var _matchIdx = 0;
function doSearch(v){
  srch = v.trim().toLowerCase();
  _matchIdx = 0;
  renderView();
  var marks = document.querySelectorAll('mark.hl');
  var el = document.getElementById('scnt');
  if (!srch){
    el.textContent = '';
  } else if (marks.length){
    el.textContent = marks.length+' match'+(marks.length!==1?'es':'');
    if (curView==='read' && marks[0]){
      marks[0].scrollIntoView({behavior:'smooth', block:'center'});
    }
  } else {
    el.textContent = 'no matches';
  }
}

function stepMatch(dir){
  var marks = document.querySelectorAll('mark.hl');
  if (!marks.length) return;
  _matchIdx = ((_matchIdx + dir) % marks.length + marks.length) % marks.length;
  marks.forEach(function(m){ m.style.outline=''; });
  marks[_matchIdx].scrollIntoView({behavior:'smooth', block:'center'});
  marks[_matchIdx].style.outline = '2px solid #E05C5C';
  document.getElementById('scnt').textContent = (_matchIdx+1)+' / '+marks.length;
}

// ── ROUTING ──────────────────────────────────────
function showView(v){
  var c = document.getElementById('content');
  c.className = '';
  curView = v;
  document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('nb-'+v);
  if (btn) btn.classList.add('on');
  var titles = {dashboard:'Dashboard',timeline:'Timeline',read:'Read',characters:'Characters',locations:'Locations',highlights:'Highlights',compare:'Compare Chapters',settings:'Settings'};
  document.getElementById('vt').textContent = titles[v]||v;
  renderView();
}

function renderView(){
  var c = document.getElementById('content');
  if      (curView==='dashboard')  renderDash(c);
  else if (curView==='timeline')   renderTL(c);
  else if (curView==='read')       renderRead(c);
  else if (curView==='characters') renderChars(c);
  else if (curView==='locations')  renderLocs(c);
  else if (curView==='highlights') renderHLView(c);
  else if (curView==='compare')    renderCompare(c);
  else if (curView==='settings')   renderSettings(c);
  updateBadges();
}

// ── DASHBOARD ────────────────────────────────────
function renderDash(c){
  document.getElementById('tbr').innerHTML = '';
  var chaps = getChaps(), cn = allCharNames(), ln = allLocNames();
  var tm = threadMap();
  var html = '<div class="card"><div class="ey">Story Overview</div>';
  html += '<div style="font-size:18px;font-weight:600;letter-spacing:-0.02em;margin-bottom:16px;">Project Statistics</div>';
  html += '<div class="sg">';
  html += '<div class="sc2"><div class="sv">'+chaps.size+'</div><div class="sl">Chapters</div></div>';
  html += '<div class="sc2"><div class="sv">'+events.length+'</div><div class="sl">Events</div></div>';
  html += '<div class="sc2 ac"><div class="sv">'+cn.size+'</div><div class="sl">Characters</div></div>';
  html += '<div class="sc2"><div class="sv">'+ln.size+'</div><div class="sl">Locations</div></div>';
  html += '</div></div>';

  if (cn.size > 0){
    html += '<div class="card"><div class="ch"><div class="ct">Character Thread Map</div><span class="tag ta">'+cn.size+' characters</span></div>';
    html += '<p style="font-size:12px;color:var(--t2);margin-bottom:14px;">Filled = character present in that chapter.</p>';
    var sorted = Object.entries(tm.map).sort(function(a,b){ return b[1].size-a[1].size; });
    sorted.forEach(function(entry){
      var name = entry[0], chapSet = entry[1];
      html += '<div class="tr2"><div class="tl" title="'+esc(name)+'">'+hl(name,srch)+'</div><div style="display:flex;gap:3px;flex-wrap:wrap;">';
      tm.allCh.forEach(function(ch){
        html += '<span class="tcp'+(chapSet.has(ch)?' on':'')+'">'+esc(ch)+'</span>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  }

  if (ln.size > 0){
    html += '<div class="card"><div class="ch"><div class="ct">Locations</div></div><div class="cr">';
    Array.from(ln).forEach(function(l){ html += '<span class="chip">'+hl(l,srch)+'</span>'; });
    html += '</div></div>';
  }

  if (events.length===0 && chars.length===0){
    html += '<div class="card"><div class="es"><div style="font-size:28px;opacity:0.3;margin-bottom:10px;">📖</div>';
    html += '<p style="font-weight:600;color:var(--t1);margin-bottom:8px;">Upload your manuscript to get started</p>';
    html += '<p style="color:var(--t2);font-size:12px;">Drop a .docx or .txt in the sidebar.</p></div></div>';
  }
  c.innerHTML = html;
}

// ── TIMELINE ─────────────────────────────────────
function renderTL(c){
  var cn = allCharNames(), chaps = getChaps();
  var tbr = document.getElementById('tbr');
  var fhtml = '<div class="fr">';
  fhtml += '<select class="fs" onchange="cfilt=this.value;renderTL(document.getElementById(\'content\'))"><option value="">All Characters</option>';
  Array.from(cn).sort().forEach(function(n){ fhtml += '<option value="'+esc(n)+'"'+(cfilt===n?' selected':'')+'>'+esc(n)+'</option>'; });
  fhtml += '</select>';
  fhtml += '<select class="fs" onchange="chfilt=this.value;renderTL(document.getElementById(\'content\'))"><option value="">All Chapters</option>';
  Array.from(chaps).sort(function(a,b){return parseInt(a)-parseInt(b);}).forEach(function(ch){ fhtml += '<option value="'+esc(ch)+'"'+(chfilt===ch?' selected':'')+'>'+esc(ch)+'</option>'; });
  fhtml += '</select>';
  fhtml += '<button class="btn bs bsm" onclick="cfilt=\'\';chfilt=\'\';renderTL(document.getElementById(\'content\'))">Clear</button>';
  if (hasAI()) fhtml += '<button class="btn ba bsm" onclick="runTimelineCheck()">✦ Check Consistency</button>';
  fhtml += '</div>';
  tbr.innerHTML = fhtml;

  if (events.length===0){
    c.innerHTML = '<div class="card"><div class="es"><div style="font-size:28px;opacity:0.3;margin-bottom:10px;">🗓</div><p style="font-weight:600;color:var(--t1);">Timeline is empty</p><p style="color:var(--t2);margin-top:4px;">Upload a manuscript or click Add Timeline Event.</p></div></div>';
    return;
  }

  var filtered = events.map(function(e,i){ return Object.assign({},e,{_i:i}); });
  if (cfilt) filtered = filtered.filter(function(e){ return e.characters && e.characters.split(',').map(function(x){return x.trim();}).indexOf(cfilt)>-1; });

// ── BUILD PROSE HTML with highlight spans ─────────
// Handles both saved highlights (color spans) AND live search marks.
// Highlights are matched by chapterId (stable event identity).
function buildProseHTML(rawText, chapterId){
  if (!rawText) return '';

  // Collect saved highlights for this chapter, sorted by start
  var hls = highlights.filter(function(h){ return h.chapterId===chapterId; })
    .slice().sort(function(a,b){ return a.start-b.start; });

  // Build the escaped+highlighted HTML segment by segment
  function renderSegment(text){
    if (!srch || !text) return escPreserve(text);
    var escaped = srch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    var result = '';
    var re = new RegExp('('+escaped+')','gi');
    var last = 0, m;
    re.lastIndex = 0;
    while ((m = re.exec(text)) !== null){
      result += escPreserve(text.slice(last, m.index));
      result += '<mark class="hl">'+escPreserve(m[1])+'</mark>';
      last = m.index + m[1].length;
    }
    result += escPreserve(text.slice(last));
    return result;
  }

  if (!hls.length){
    return renderSegment(rawText);
  }

  var out = '';
  var pos = 0;
  hls.forEach(function(h){
    if (h.start > pos){
      out += renderSegment(rawText.slice(pos, h.start));
    }
    var bg    = HL_BG[h.color]  || HL_BG.yellow;
    var solid = HL_SOLID[h.color]|| HL_SOLID.yellow;
    var tagStr = h.tags && h.tags.length ? '#'+h.tags.join(' #') : '';
    out += '<span class="hspan hc-'+esc(h.color)+'" '+
           'style="background:'+bg+';outline:1px solid '+solid+'22;" '+
           'data-hlid="'+h.id+'" title="'+esc(tagStr)+'" '+
           'onclick="openHLEdit(\''+h.id+'\')">'
         + renderSegment(rawText.slice(h.start, h.end))
         + '</span>';
    pos = h.end;
  });
  if (pos < rawText.length){
    out += renderSegment(rawText.slice(pos));
  }
  return out;
}

// Escape that converts newlines to <br> for HTML rendering
function escPreserve(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ── TEXT SELECTION → TOOLBAR ─────────────────────
function onProseSelect(e){
  // Small delay so selection is finalised on touch
  setTimeout(function(){
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.rangeCount) return;
    var selText = sel.toString();
    if (!selText || selText.trim().length < 1) return;

    // Map selection back to raw text offsets
    var prose = document.getElementById('rproseEl');
    if (!prose) return;
    var range = sel.getRangeAt(0);

    // Get char offset of range.startContainer/startOffset within prose's textContent
    var startOff = getTextOffset(prose, range.startContainer, range.startOffset);
    var endOff   = getTextOffset(prose, range.endContainer,   range.endOffset);

    if (startOff < 0 || endOff <= startOff) return;

    hlPending = { start: startOff, end: endOff, text: selText };

    // Position toolbar
    var rect = range.getBoundingClientRect();
    var tb = document.getElementById('hltb');
    document.getElementById('htag').value = '';
    // Reset swatches
    document.querySelectorAll('.htsw').forEach(function(s){ s.classList.remove('sel'); });
    var selSw = document.querySelector('.htsw[data-c="'+hlColor+'"]');
    if (selSw) selSw.classList.add('sel');

    tb.classList.add('vis');
    var left = Math.max(8, Math.min(rect.left + window.scrollX, window.innerWidth - 300));
    var top  = rect.top + window.scrollY - 58;
    if (top < 8) top = rect.bottom + window.scrollY + 8;
    tb.style.left = left + 'px';
    tb.style.top  = top  + 'px';
  }, 10);
}

// Walk the DOM tree to get a character offset within a container element
function getTextOffset(container, node, nodeOffset){
  var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
  var offset = 0;
  var n;
  while ((n = walker.nextNode())){
    if (n === node) return offset + nodeOffset;
    offset += n.textContent.length;
  }
  return -1;
}

function pickColor(c, el){
  hlColor = c;
  document.querySelectorAll('.htsw').forEach(function(s){ s.classList.remove('sel'); });
  if (el) el.classList.add('sel');
}

function closeHLToolbar(){
  document.getElementById('hltb').classList.remove('vis');
  hlPending = null;
  if (window.getSelection) window.getSelection().removeAllRanges();
}

function commitHL(){
  if (!hlPending){ closeHLToolbar(); return; }
  var txt = hlPending.text.trim();
  if (!txt){ toast('Nothing selected','er'); closeHLToolbar(); return; }

  var tagRaw = (document.getElementById('htag').value||'').trim();
  var tags = tagRaw ? tagRaw.split(/[,;]+/).map(function(t){ return t.trim().toLowerCase(); }).filter(Boolean) : [];

  var readable = readableEvents();
  var cur = readable[readIdx] || {};
  var h = {
    id:        uid(),
    chapterId: cur.fullText ? cur.fullText.substring(0,80) : ('idx_'+readIdx),
    chNum:     cur.chapter||'',
    chHead:    cur.heading || 'Chapter '+cur.chapter,
    start:     hlPending.start,
    end:       hlPending.end,
    text:      txt,
    color:     hlColor,
    tags:      tags,
    note:      '',
    ts:        Date.now()
  };
  highlights.push(h);
  hlPending = null;
  closeHLToolbar();
  updateBadges();

  // Re-render prose in place without full page re-render (preserves scroll)
  var prose = document.getElementById('rproseEl');
  if (prose){
    var cur2 = readable[readIdx];
    prose.innerHTML = buildProseHTML(cur2 ? cur2.fullText||'' : '', cur2&&cur2.fullText ? cur2.fullText.substring(0,80) : ('idx_'+readIdx));
    prose.removeEventListener('mouseup', onProseSelect);
    prose.addEventListener('mouseup', onProseSelect);
  }
  renderRRPanel();
  // Update ALL highlight badges (topbar toggle button + right panel header + sidebar nav)
  var topBadge = document.querySelector('#hl-tog .badge');
  if (topBadge) topBadge.textContent = highlights.length;
  var rrBadge = document.querySelector('#rrpanel .rrh .badge');
  if (rrBadge) rrBadge.textContent = highlights.filter(function(h2){return h2.chapterId===(cur.fullText?cur.fullText.substring(0,80):('idx_'+readIdx));}).length;
  // Update toc dot
  var tocBtn = document.querySelectorAll('.ti2b')[readIdx];
  if (tocBtn){
    var existDot = tocBtn.querySelector('.toc-hldot');
    var cnt = highlights.filter(function(h2){return h2.chapterId===(cur.fullText?cur.fullText.substring(0,80):('idx_'+readIdx));}).length;
    if (existDot) existDot.textContent = cnt ? '🖊'+cnt : '';
    else if (cnt){
      var dot = document.createElement('span');
      dot.className='toc-hldot'; dot.textContent='🖊'+cnt;
      tocBtn.appendChild(dot);
    }
  }
  toast('Highlight saved'+(tags.length ? ' — #'+tags.join(' #') : ''),'ok');
}

// Dismiss toolbar on outside click
document.addEventListener('mousedown', function(e){
  var tb = document.getElementById('hltb');
  if (tb && tb.classList.contains('vis') && !tb.contains(e.target)){
    var prose = document.getElementById('rproseEl');
    if (!prose || !prose.contains(e.target)) closeHLToolbar();
  }
});

// ── HIGHLIGHTS RIGHT PANEL ────────────────────────
function renderRRPanel(){
  var list = document.getElementById('rrlist');
  if (!list) return;
  var search = document.getElementById('rrsearch');
  var q = (search ? search.value : hlTagFilt).trim().toLowerCase();
  hlTagFilt = q;

  var hls = highlights.filter(function(h){ var rd=readableEvents(); var ev=rd[readIdx]; return h.chapterId===(ev&&ev.fullText?ev.fullText.substring(0,80):'idx_'+readIdx); });
  if (q){
    hls = hls.filter(function(h){
      return h.text.toLowerCase().includes(q) ||
             h.tags.some(function(t){ return t.includes(q); }) ||
             (h.note||'').toLowerCase().includes(q);
    });
  }
  hls = hls.slice().sort(function(a,b){ return a.start-b.start; });

  if (!hls.length){
    list.innerHTML = '<div style="padding:20px 10px;text-align:center;"><div style="font-size:22px;opacity:.25;margin-bottom:8px;">🖊</div>'+
      '<p style="font-size:11px;color:var(--t3);">'+(q?'No matches':'Select text in the chapter to highlight')+'</p></div>';
    return;
  }

  var html = '';
  hls.forEach(function(h){
    var solid = HL_SOLID[h.color]||'#ccc';
    var shortTxt = h.text.length>100 ? h.text.slice(0,100)+'…' : h.text;
    html += '<div class="hlcard" onclick="scrollToHL(\''+h.id+'\')">';
    html += '<div class="hlcard-bar" style="background:'+solid+'"></div>';
    html += '<div style="padding-left:8px">';
    html += '<div class="hlcard-txt">'+esc(shortTxt)+'</div>';
    if (h.note) html += '<div style="font-size:11px;color:var(--t2);font-style:italic;margin-bottom:4px">'+esc(h.note)+'</div>';
    html += '<div class="hlcard-foot">';
    h.tags.forEach(function(t){
      html += '<span class="hlcard-tag" onclick="event.stopPropagation();filterRR(\''+esc(t)+'\')">#'+esc(t)+'</span>';
    });
    html += '</div></div>';
    html += '<button class="hlcard-del" onclick="event.stopPropagation();deleteHL(\''+h.id+'\')"><svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>';
    html += '</div>';
  });
  list.innerHTML = html;
}

function filterRR(tag){
  var s = document.getElementById('rrsearch');
  if (s){ s.value=tag; renderRRPanel(); }
}

function scrollToHL(id){
  var span = document.querySelector('[data-hlid="'+id+'"]');
  if (span) span.scrollIntoView({behavior:'smooth',block:'center'});
}

function toggleHLPanel(){
  hlPanelOn = !hlPanelOn;
  renderRead(document.getElementById('content'));
}

function deleteHL(id){
  highlights = highlights.filter(function(h){ return h.id!==id; });
  updateBadges();
  // Re-render prose
  var readable = readableEvents();
  var prose = document.getElementById('rproseEl');
  if (prose && readable[readIdx]){
    var _re=readable[readIdx]; prose.innerHTML = buildProseHTML(_re.fullText||'', _re.fullText?_re.fullText.substring(0,80):('idx_'+readIdx));
    prose.removeEventListener('mouseup', onProseSelect);
    prose.addEventListener('mouseup', onProseSelect);
  }
  renderRRPanel();
  // Sync all badges
  var topBadge = document.querySelector('#hl-tog .badge');
  if (topBadge) topBadge.textContent = highlights.length;
  var rrBadge = document.querySelector('#rrpanel .rrh .badge');
  if (rrBadge) rrBadge.textContent = highlights.filter(function(h2){var rd=readableEvents();var ev=rd[readIdx];return h2.chapterId===(ev&&ev.fullText?ev.fullText.substring(0,80):'idx_'+readIdx);}).length;
  toast('Highlight removed','in');
}

// ── HIGHLIGHTS FULL VIEW ─────────────────────────
function renderHLView(c){
  c.className = '';
  document.getElementById('tbr').innerHTML =
    (highlights.length ? '<button class="btn bs bsm" onclick="exportHLCSV()">Export CSV</button>' : '')+
    (highlights.length && hasAI() ? '<button class="btn ba bsm" onclick="analyzeHighlights()">✦ Analyze Highlights</button>' : '');

  if (!highlights.length){
    c.innerHTML = '<div class="card"><div class="es"><div style="font-size:32px;opacity:.3">🖊</div>'+
      '<p style="font-weight:600;color:var(--t1);margin-bottom:6px">No highlights yet</p>'+
      '<p style="color:var(--t2);font-size:12px">Go to Read, select text, and save a highlight.</p></div></div>';
    return;
  }

  var allTags = [];
  highlights.forEach(function(h){ h.tags.forEach(function(t){ if(allTags.indexOf(t)<0) allTags.push(t); }); });
  allTags.sort();

  var html = '<div class="card" style="margin-bottom:14px;">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:10px">Filter by Tag</div>';
  html += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
  html += '<input class="si" id="hlvsearch" type="text" placeholder="Search tags, text, chapter…" style="max-width:260px;" oninput="renderHLList()">';
  if (allTags.length){
    allTags.forEach(function(t){
      html += '<span class="hlcard-tag" style="cursor:pointer" onclick="setHLVSearch(\''+esc(t)+'\')">#'+esc(t)+'</span>';
    });
  }
  html += '</div></div>';
  html += '<div id="hlvlist"></div>';
  c.innerHTML = html;
  renderHLList();
}

function setHLVSearch(tag){
  var s = document.getElementById('hlvsearch');
  if (s){ s.value=tag; renderHLList(); }
}

function renderHLList(){
  var el = document.getElementById('hlvlist');
  if (!el) return;
  var sv = document.getElementById('hlvsearch');
  var q = (sv ? sv.value : '').trim().toLowerCase();

  // Group by chapter
  var byChap = {};
  highlights.forEach(function(h){
    var key = h.chapterId||('idx_'+h.chIdx);
    if (!byChap[key]) byChap[key] = {chapterId:key,chIdx:h.chIdx,chNum:h.chNum,chHead:h.chHead,items:[]};
    byChap[key].items.push(h);
  });

  var html = '';
  Object.keys(byChap)
    .sort(function(a,b){ return parseInt(byChap[a].chNum)-parseInt(byChap[b].chNum)||a-b; })
    .forEach(function(key){
      var grp = byChap[key];
      var items = q
        ? grp.items.filter(function(h){
            return h.text.toLowerCase().includes(q)||
                   h.tags.some(function(t){return t.includes(q);})||
                   (h.note||'').toLowerCase().includes(q)||
                   (h.chHead||'').toLowerCase().includes(q);
          })
        : grp.items;
      if (!items.length) return;

      html += '<div class="card" style="margin-bottom:12px;">';
      html += '<div style="font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;">'+
               '<span class="tag ta">Ch.'+esc(String(grp.chNum))+'</span>'+esc(grp.chHead)+'</div>';
      items.forEach(function(h){
        var solid = HL_SOLID[h.color]||'#ccc';
        var bg    = HL_BG[h.color]||HL_BG.yellow;
        html += '<div style="display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--bd);margin-bottom:8px;cursor:pointer" onclick="jumpToHL(\''+h.id+'\','+h.chIdx+')">';
        html += '<div style="width:5px;background:'+solid+';flex-shrink:0"></div>';
        html += '<div style="flex:1;padding:10px 12px">';
        html += '<div style="font-size:13px;line-height:1.7;background:'+bg+';border-radius:4px;padding:4px 8px;margin-bottom:5px">'+esc(h.text)+'</div>';
        if (h.note) html += '<div style="font-size:11px;color:var(--t2);font-style:italic;margin-bottom:4px">'+esc(h.note)+'</div>';
        html += '<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">';
        h.tags.forEach(function(t){ html += '<span class="hlcard-tag">#'+esc(t)+'</span>'; });
        html += '<span style="margin-left:auto;font-size:10px;color:var(--t3)">'+new Date(h.ts).toLocaleDateString()+'</span>';
        html += '</div></div>';
        html += '<button style="padding:0 10px;background:transparent;border:none;border-left:1px solid var(--bd);color:var(--t3);cursor:pointer;font-size:11px" onclick="event.stopPropagation();openHLEdit(\''+h.id+'\')">Edit</button>';
        html += '</div>';
      });
      html += '</div>';
    });

  el.innerHTML = html || '<div style="padding:20px;text-align:center;font-size:12px;color:var(--t3)">No highlights match.</div>';
}

function jumpToHL(id, chIdx){
  readIdx = chIdx;
  showView('read');
  setTimeout(function(){ scrollToHL(id); }, 200);

function saveHLEdit(id){

function renderCompare(c){
  ensureEventIds(); // re-derive chapterIds from chIdx in case of stale data
  c.className = 'read-mode';
  document.getElementById('tbr').innerHTML = '<button class="btn bs bsm" onclick="showView(\'read\')">← Back to Read</button>';
  var readable = readableEvents();
  if (readable.length < 2){
    c.className='';
    c.innerHTML='<div class="card"><div class="es"><p style="font-weight:600;color:var(--t1)">Need at least 2 chapters to compare</p></div></div>';
    return;
  }
  var li = Math.max(0, readIdx>0?readIdx-1:0);
  var ri = Math.min(readable.length-1, li+1);
  if (li===ri) ri = Math.min(readable.length-1, li+1);

  function opts(sel){
    return readable.map(function(e,i){
      var cnt = highlights.filter(function(h){ return h.chapterId===(e.fullText?e.fullText.substring(0,80):('idx_'+i)); }).length;
      var label = esc(e.heading || e.event || 'Chapter '+e.chapter);
      return '<option value="'+i+'"'+(i===sel?' selected':'')+'>'+label+(cnt?' ('+cnt+'🖊)':'')+'</option>';
    }).join('');
  }

  c.innerHTML =
    '<div class="cmpgrid">'+
    '<div class="cmppane" id="cmpl">'+
      '<div class="cmphead"><select class="cmpsel" id="cmplsel" onchange="updateCmpPane(\'l\',parseInt(this.value))">'+opts(li)+'</select>'+
        '<span id="cmpl-cnt"></span></div>'+
      '<div class="cmp-legend" id="cmpl-legend"></div>'+
      '<div class="cmpbody" id="cmplbody"></div>'+
    '</div>'+
    '<div class="cmppane" id="cmpr">'+
      '<div class="cmphead"><select class="cmpsel" id="cmprsel" onchange="updateCmpPane(\'r\',parseInt(this.value))">'+opts(ri)+'</select>'+
        '<span id="cmpr-cnt"></span></div>'+
      '<div class="cmp-legend" id="cmpr-legend"></div>'+
      '<div class="cmpbody" id="cmprbody"></div>'+
    '</div>'+
    '</div>';

  setCmpPane('l', li);
  setCmpPane('r', ri);
}

function setCmpPane(side, idx){
  var readable = readableEvents();
  var e = readable[idx];
  if (!e) return;

  var bodyEl   = document.getElementById('cmp'+side+'body');
  var cntEl    = document.getElementById('cmp'+side+'-cnt');
  var legendEl = document.getElementById('cmp'+side+'-legend');

  // Render prose with highlights baked in
  var stableId = e.fullText ? e.fullText.substring(0,80) : ('idx_'+idx);
  if (bodyEl) bodyEl.innerHTML = buildProseHTML(e.fullText||'', stableId);

  // Count and badge
  var chHls = highlights.filter(function(h){ return h.chapterId===stableId; });
  if (cntEl){
    cntEl.innerHTML = chHls.length
      ? '<span style="font-size:11px;color:var(--ac);font-weight:600;">🖊 '+chHls.length+' highlight'+(chHls.length!==1?'s':'')+'</span>'
      : '<span style="font-size:11px;color:var(--t3);">no highlights</span>';
  }

  // Legend: show unique colors + tags used in this chapter's highlights
  if (legendEl){
    if (!chHls.length){
      legendEl.style.display='none';
    } else {
      legendEl.style.display='flex';
      // Collect unique colors and all tags
      var colorsSeen = {};
      var allTags = [];
      chHls.forEach(function(h){
        colorsSeen[h.color] = true;
        h.tags.forEach(function(t){ if(allTags.indexOf(t)<0) allTags.push(t); });
      });
      var html = '';
      Object.keys(colorsSeen).forEach(function(col){
        html += '<span class="cmp-legend-item"><span class="cmp-legend-dot" style="background:'+HL_SOLID[col]+'"></span>'+col+'</span>';
      });
      allTags.forEach(function(t){
        html += '<span class="cmp-legend-item" style="cursor:pointer" onclick="cmpScrollTag(\''+esc(t)+'\',\''+side+'\')"><span style="color:var(--ac)">#</span>'+esc(t)+'</span>';
      });
      legendEl.innerHTML = html;
    }
  }
}

function updateCmpPane(side, idx){ setCmpPane(side, idx); }

// Click a tag in the compare legend to scroll to first match in that pane
function cmpScrollTag(tag, side){
  var body = document.getElementById('cmp'+side+'body');
  if (!body) return;
  var spans = body.querySelectorAll('.hspan');
  for (var i=0;i<spans.length;i++){
    var title = spans[i].getAttribute('title')||'';
    if (title.indexOf('#'+tag)>-1){
      spans[i].scrollIntoView({behavior:'smooth',block:'center'});
      spans[i].style.boxShadow='0 0 0 3px '+HL_SOLID.yellow;
      var s=spans[i]; setTimeout(function(){ s.style.boxShadow=''; },1800);
      break;
    }
  }
}

// Assign stable ids to any events missing them, and fix any highlights
// whose chapterId was saved as undefined/null by migrating them to idx-based ids
function ensureEventIds(){
  // Always re-derive chapterId from chIdx using fullText key
  // This fixes any stale/wrong chapterId from previous saves
  var rd = readableEvents();
  highlights.forEach(function(h){
    var ev = rd[h.chIdx];
    if(ev && ev.fullText){
      h.chapterId = ev.fullText.substring(0,80);
    } else if(!h.chapterId){
      h.chapterId = 'idx_'+h.chIdx;
    }
  });
}

async function analyzeChapter(body, num){
  var sys = 'You are a story analyst. Respond ONLY with valid JSON, no markdown.\nReturn: {"summary":"one sentence max 15 words","characters":["Name"],"location":"place or empty"}\nOnly proper character names.';

async function callAI(sys, msg, maxTokens){
  var ai = getAI();
  maxTokens = maxTokens || 1000;
  var r, d;
  if (ai.p==='claude'){
    r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ai.k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTokens,system:sys,messages:[{role:'user',content:msg}]})});
    d = await r.json(); if(d.error) throw new Error(d.error.message);
    return (d.content[0].text||'').trim();
  } else if (ai.p==='openai'||ai.p==='deepseek'){
    var ep = ai.p==='openai'?'https://api.openai.com/v1/chat/completions':'https://api.deepseek.com/v1/chat/completions';
    var model = ai.p==='openai'?'gpt-4o-mini':'deepseek-chat';
    r = await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ai.k},body:JSON.stringify({model:model,max_tokens:maxTokens,messages:[{role:'system',content:sys},{role:'user',content:msg}]})});
    d = await r.json(); if(d.error) throw new Error(d.error.message);
    return (d.choices[0].message.content||'').trim();
  } else if (ai.p==='gemini'){
    r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+ai.k,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:[{parts:[{text:msg}]}],generationConfig:{maxOutputTokens:maxTokens}})});
    d = await r.json(); if(d.error) throw new Error(d.error.message);
    return (d.candidates[0].content.parts[0].text||'').trim();
  }
  throw new Error('Unknown provider');
}

// ── BUILT-IN DOCX EXTRACTOR (no CDN, handles DEFLATE) ──────
async function extractDocxText(arrayBuffer){
  var bytes = new Uint8Array(arrayBuffer);

  // Find End of Central Directory
  var eocd = -1;
  for (var i = bytes.length-22; i >= 0; i--){
    if (bytes[i]===0x50&&bytes[i+1]===0x4B&&bytes[i+2]===0x05&&bytes[i+3]===0x06){ eocd=i; break; }
  }
  if (eocd < 0) throw new Error('Not a valid ZIP/DOCX');

  var cdOff  = readU32(bytes, eocd+16);
  var cdSize = readU32(bytes, eocd+12);

  // Parse central directory, find word/document.xml
  var pos = cdOff;
  while (pos < cdOff + cdSize){
    if (bytes[pos]!==0x50||bytes[pos+1]!==0x4B||bytes[pos+2]!==0x01||bytes[pos+3]!==0x02) break;
    var compression = readU16(bytes, pos+10);
    var compSize    = readU32(bytes, pos+20);
    var fnLen       = readU16(bytes, pos+28);
    var extraLen    = readU16(bytes, pos+30);
    var cmtLen      = readU16(bytes, pos+32);
    var lhOff       = readU32(bytes, pos+42);
    var fname       = bytesToStr(bytes.slice(pos+46, pos+46+fnLen));

    if (fname === 'word/document.xml'){
      var lFnLen    = readU16(bytes, lhOff+26);
      var lExtraLen = readU16(bytes, lhOff+28);
      var dataStart = lhOff + 30 + lFnLen + lExtraLen;
      var compressed = bytes.slice(dataStart, dataStart + compSize);

      var xml;
      if (compression === 0){
        // Stored
        xml = bytesToStr(compressed);
      } else if (compression === 8){
        // DEFLATE — use DecompressionStream
        xml = await inflateRaw(compressed);
      } else {
        throw new Error('Unsupported compression: '+compression);
      }
      return parseDocXml(xml);
    }
    pos += 46 + fnLen + extraLen + cmtLen;
  }
  throw new Error('word/document.xml not found in DOCX');
}

async function inflateRaw(data){
  var ds = new DecompressionStream('deflate-raw');
  var writer = ds.writable.getWriter();
  var reader = ds.readable.getReader();
  writer.write(data);
  writer.close();
  var chunks = [];
  while (true){
    var res = await reader.read();
    if (res.done) break;
    chunks.push(res.value);
  }
  var totalLen = chunks.reduce(function(a,b){ return a+b.length; },0);
  var out = new Uint8Array(totalLen);
  var offset = 0;
  chunks.forEach(function(ch){ out.set(ch, offset); offset+=ch.length; });
  return new TextDecoder('utf-8').decode(out);
}

function readU16(b,o){ return b[o]|(b[o+1]<<8); }
function readU32(b,o){ return (b[o]|(b[o+1]<<8)|(b[o+2]<<16)|(b[o+3]<<24))>>>0; }
function bytesToStr(b){
  var s=''; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return s;
}

function parseDocXml(xml){
  var lines = [];
  var paras = xml.split(/<w:p[ >\/]/);
  paras.forEach(function(para){
    var runs = '';
    var re = /<w:t[^>]*>([^<]*)<\/w:t>/g;
    var m;
    while ((m = re.exec(para)) !== null){ runs += m[1]; }
    var line = runs.trim();
    if (line) lines.push(line);
  });
  return lines.join('\n');
}

async function parseImport(text, filename){
  var chRe = /^((?:prologue|epilogue|chapter\s+[\divxlcdmIVXLCDM\w]+)[^\n]*)/gim;
  var matches = Array.from(text.matchAll(chRe));
  var parts   = text.split(chRe);

  if (events.length > 0){
    if (!confirm('You have '+events.length+' existing events.\n\nOK = Replace all   Cancel = Append')){}
    else events = [];
  }

  var chapters = [];
  if (matches.length === 0){
    chapters.push({num:1, heading:filename.replace(/\.[^.]+$/,''), body:text});
  } else {
    matches.forEach(function(m, i){
      var clean = m[0].replace(/\s*[\u2013\u2014\-]+\s*$/,'').replace(/\s+/g,' ').trim();
      chapters.push({num:i+1, heading:clean, body:parts[i*2+2]||''});
    });
  }

  var start = events.length;
  chapters.forEach(function(ch){
    events.push({
      id:       uid(),
      chapter:  ch.num,
      heading:  ch.heading,
      event:    'Analyzing…',
      characters: '',
      location: '',
      notes:    ch.body.substring(0,400).replace(/\s+/g,' ').trim(),
      fullText: ch.body
    });
  });

  showView('timeline');
  renderView();
  ensureEventIds();
  toast(chapters.length+' chapter'+(chapters.length!==1?'s':'')+' imported','in');

  var ai = getAI();
  if (!ai.k){
    chapters.forEach(function(ch,i){
      events[start+i].event = ch.body.trim().split(/[.!?\n]/)[0].trim().substring(0,80) || ch.heading;
    });
    renderView(); updateBadges();
    toast('No AI key — used first sentence. Set key in AI Settings.','in');
    return;
  }

  var ind=document.getElementById('ai-ind'),bar=document.getElementById('ai-bar'),lbl=document.getElementById('ai-lbl'),ctr=document.getElementById('ai-ctr');
  ind.style.display='block';
  var done=0;
  for (var i=0; i<chapters.length; i++){
    var ch=chapters[i];
    lbl.textContent='Chapter '+ch.num+' of '+chapters.length;
    ctr.textContent=(i+1)+' / '+chapters.length;
    bar.style.width=Math.round((i/chapters.length)*100)+'%';
    try{
      var res = await analyzeChapter(ch.body, ch.num);
      var idx = start+i;
      events[idx].event      = res.summary || ch.heading;
      events[idx].characters = Array.isArray(res.characters) ? res.characters.join(', ') : (res.characters||'');
      events[idx].location   = res.location||'';
      done++;
      if (curView==='timeline') renderView();
    } catch(err){
      events[start+i].event = ch.body.trim().split(/[.!?\n]/)[0].trim().substring(0,80)||ch.heading;
      toast('Ch.'+ch.num+' AI error: '+err.message,'er');
    }
  }
  bar.style.width='100%'; lbl.textContent='Done'; ctr.textContent=done+'/'+chapters.length+' succeeded';
  setTimeout(function(){ ind.style.display='none'; }, 3500);
  renderView(); updateBadges();
  toast(done+' chapter'+(done!==1?'s':'')+' analyzed','ok');
}

function _doGSignIn(cb){
  var cfg = getGoogCfg();
  var status = document.getElementById('gsignin-status');
  if (status) status.textContent = 'Opening Google sign-in…';

  loadGIS(function(){
    try {
      var client = google.accounts.oauth2.initTokenClient({
        client_id: cfg.clientId,
        scope: 'https://www.googleapis.com/auth/documents.readonly https://www.googleapis.com/auth/drive.readonly',
        callback: function(resp){
          if (resp.error){
            var msg = resp.error === 'popup_closed_by_user'
              ? 'Sign-in window was closed. Try again.'
              : 'Sign-in failed: '+resp.error;
            toast(msg, 'er');
            if (status) status.textContent = msg;
            return;
          }
          _gToken = resp.access_token;
          updateGDocBtn();
          closeModal();
          toast('Connected to Google ✓','ok');
          if (window._gSignInCb) window._gSignInCb();
        }
      });
      client.requestAccessToken({prompt:'select_account'});
    } catch(e){
      var msg = 'Error: '+e.message;
      toast(msg,'er');
      if (status) status.textContent = msg;
    }
  });
}

  html += '<div style="padding:16px;border:1px solid var(--bd);border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s;" onclick="closeModal();_openDocByUrl()" onmouseover="this.style.borderColor=\'var(--ac)\';this.style.background=\'var(--acs)\'" onmouseout="this.style.borderColor=\'var(--bd)\';this.style.background=\'\'">'+
    '<div style="font-size:13px;font-weight:600;margin-bottom:3px;">🔗 Paste a Google Docs URL</div>'+
    '<div style="font-size:12px;color:var(--t2)">Import directly from a link if you have the document URL</div></div>';
  html += '</div>';

  html += '<div class="mof"><button class="btn bs" onclick="closeModal()">Cancel</button><button class="btn bs" onclick="gSignOut();closeModal()">Sign Out</button></div>';
  html += '</div></div>';
  document.getElementById('mr').innerHTML = html;
}

function _openPicker(){
  var cfg = getGoogCfg();
  loadPickerAPI(function(){
    try {
      var view = new google.picker.DocsView()
        .setMimeTypes('application/vnd.google-apps.document')
        .setSelectFolderEnabled(false);
      var builder = new google.picker.PickerBuilder()
        .addView(view)
        .setOAuthToken(_gToken)
        .setTitle('Choose a Google Doc to import')
        .setCallback(function(data){
          if (data.action === google.picker.Action.PICKED){
            var doc = data.docs[0];
            fetchGDoc(doc.id, doc.name);
          }
          if (data.action === google.picker.Action.CANCEL){
            // do nothing
          }
        });
      // Developer key required for Picker to work
      if (cfg.apiKey) builder.setDeveloperKey(cfg.apiKey);
      builder.build().setVisible(true);
    } catch(e){
      toast('Picker error: '+e.message+' — try Paste URL instead','er');
      _openDocByUrl();
    }
  });
}

function _openDocByUrl(){
  closeModal();
  var html = '<div class="mov" onclick="if(event.target===this)closeModal()"><div class="mo" style="max-width:500px">';
  html += '<div class="mot">Open Google Doc by URL</div>';
  html += '<div class="mos">Paste the URL of any Google Doc you have view access to.</div>';
  html += '<div class="fg"><label class="fl">Google Doc URL</label>';
  html += '<input class="fi2" id="gdocurl" placeholder="https://docs.google.com/document/d/…" oninput="_previewDocUrl(this.value)" onkeydown="if(event.key===\'Enter\')_importDocByUrl()"></div>';
  html += '<div id="gdoc-url-hint" style="font-size:12px;color:var(--t2);margin-top:-8px;margin-bottom:12px;min-height:18px;"></div>';
  html += '<div class="mof"><button class="btn bs" onclick="closeModal()">Cancel</button><button class="btn ba" id="gdoc-url-go" onclick="_importDocByUrl()" disabled>Import</button></div>';
  html += '</div></div>';
  document.getElementById('mr').innerHTML = html;
  setTimeout(function(){ var f=document.getElementById('gdocurl'); if(f) f.focus(); },100);
}

function _previewDocUrl(val){
  var hint = document.getElementById('gdoc-url-hint');
  var btn  = document.getElementById('gdoc-url-go');
  var m = val.match(/\/document\/d\/([\w-]+)/);
  if (m){
    if (hint) hint.innerHTML = '<span style="color:var(--ok)">✓ Valid URL — Doc ID: <code style="font-family:\'DM Mono\',monospace">'+m[1].substring(0,20)+'…</code></span>';
    if (btn) btn.disabled = false;
  } else {
    if (hint) hint.textContent = val.length > 5 ? 'Not a valid Google Docs URL' : '';
    if (btn) btn.disabled = true;
  }
}

async function _importDocByUrl(){
  var input = document.getElementById('gdocurl');
  var val = input ? input.value : '';
  var m = val.match(/\/document\/d\/([\w-]+)/);
  if (!m){ toast('Invalid URL','er'); return; }
  closeModal();
  await fetchGDoc(m[1], 'Google Doc');
}

async function fetchGDoc(docId, docName){
  if (!_gToken){ toast('Not signed in to Google','er'); return; }
  toast('Fetching "'+docName+'"…','in');
  try {
    // Drive API export — docId must NOT be encoded
    var url = 'https://www.googleapis.com/drive/v3/files/'+docId+'/export?mimeType=text/plain';
    var resp = await fetch(url, { headers: { 'Authorization': 'Bearer '+_gToken } });

    if (resp.status === 401){
      _gToken = null;
      updateGDocBtn();
      window._gSignInCb = function(){ fetchGDoc(docId, docName); };
      gSignIn(null);
      return;
    }
    if (resp.status === 403){
      // Try to get the actual error message from Google
      var errBody = await resp.json().catch(function(){ return {}; });
      var errMsg = (errBody.error && errBody.error.message) || 'Access denied';
      // Common cause: token granted but Drive scope not accepted — force re-consent
      toast('Access denied: '+errMsg+' — try reconnecting','er');
      _gToken = null;
      updateGDocBtn();
      window._gSignInCb = function(){ fetchGDoc(docId, docName); };
      gSignIn(null);
      return;
    }
    if (resp.status === 404){
      toast('Document not found. Make sure sharing is set to "Anyone with link can view".','er');
      return;
    }
    if (!resp.ok){
      var errText = await resp.text().catch(function(){ return 'Unknown error'; });
      throw new Error('HTTP '+resp.status+': '+errText.substring(0,200));
    }

    var text = await resp.text();
    if (!text || !text.trim()){ toast('"'+docName+'" appears to be empty','er'); return; }

    parseImport(text, docName);
    toast('"'+docName+'" imported successfully','ok');

  } catch(e){
    toast('Import failed: '+e.message,'er');
  }
}
