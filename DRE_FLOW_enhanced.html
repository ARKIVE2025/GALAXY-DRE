<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRE Flow 4.5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{
  --bg:#F4F5F7;--surface:#fff;--panel:#1F2328;
  --pnav:rgba(255,255,255,0.06);--pnav-on:rgba(255,255,255,0.12);
  --t1:#1F2328;--t2:#6B7585;--t3:#9AA3B0;
  --ti:#fff;--ti2:rgba(255,255,255,0.55);--ti3:rgba(255,255,255,0.3);
  --bd:rgba(0,0,0,0.07);--bdi:rgba(255,255,255,0.06);
  --ac:#5B7CDD;--acs:#EEF2FF;
  --ok:#4CAF82;--oks:#EEF9F4;
  --warn:#D4923A;--warns:#FDF4E7;
  --err:#E05C5C;--errs:#FEF0F0;
  --neu:#B0BAC7;--neus:#F1F3F5;
  --hl:#FFF176;
  --hly:rgba(255,220,0,0.55);--hlg:rgba(72,199,90,0.42);--hlb:rgba(91,124,221,0.38);
  --hlp:rgba(228,30,99,0.3);--hlo:rgba(255,140,0,0.45);--hlu:rgba(160,40,200,0.32);
  --r1:10px;--r2:16px;--r3:24px;--rp:99px;
  --s1:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --s2:0 4px 16px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04);
  --s3:0 20px 48px rgba(0,0,0,0.12),0 8px 20px rgba(0,0,0,0.06);
  --editor-bar:#FFFFFF;--editor-bar-bd:rgba(0,0,0,0.08);
}
body.dark{
  --bg:#0F1117;--surface:#181C23;--panel:#0A0D12;
  --pnav:rgba(255,255,255,0.05);--pnav-on:rgba(255,255,255,0.1);
  --t1:#E8ECF2;--t2:#8A95A3;--t3:#555E6B;
  --ti:#E8ECF2;--ti2:rgba(232,236,242,0.55);--ti3:rgba(232,236,242,0.28);
  --bd:rgba(255,255,255,0.07);--bdi:rgba(255,255,255,0.07);
  --ac:#7B9AE8;--acs:#1A2340;
  --ok:#3DBF7A;--oks:#0F2218;
  --warn:#E0A44A;--warns:#231A0A;
  --err:#E86B6B;--errs:#231010;
  --neu:#3A4250;--neus:#1A1E26;
  --hl:rgba(255,230,0,0.35);
  --hly:rgba(255,220,0,0.38);--hlg:rgba(72,199,90,0.3);--hlb:rgba(91,124,221,0.3);
  --hlp:rgba(228,30,99,0.25);--hlo:rgba(255,140,0,0.32);--hlu:rgba(160,40,200,0.28);
  --s1:0 1px 3px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2);
  --s2:0 4px 16px rgba(0,0,0,0.4),0 2px 6px rgba(0,0,0,0.2);
  --s3:0 20px 48px rgba(0,0,0,0.5),0 8px 20px rgba(0,0,0,0.3);
  --editor-bar:#181C23;--editor-bar-bd:rgba(255,255,255,0.08);
}
body.dark .mov{background:rgba(0,0,0,0.72);}
body.dark .mo{background:var(--surface);color:var(--t1);}
body.dark input,body.dark textarea,body.dark select{color-scheme:dark;}
body.dark .fs option,body.dark .fsel option,body.dark .cmpsel option{background:var(--surface);color:var(--t1);}
body.dark mark.hl{background:rgba(255,230,0,0.4);color:var(--t1);}
body.dark .chcard{background:var(--surface);}
body.dark #tc{background:var(--surface);color:var(--t1);border-color:var(--bd);}
body.dark .topbar{background:var(--surface);}
body.dark .card{background:var(--surface);}
body.dark .cmphead{background:var(--surface);}
body.dark .rtoc{background:var(--surface);}
body.dark .rright{background:var(--surface);}
body.dark .editor-toolbar{background:var(--editor-bar);border-color:var(--editor-bar-bd);}
body.dark .etbtn{color:var(--t2);}
body.dark .etbtn:hover{background:var(--neus);color:var(--t1);}
body.dark .etbtn.active{background:var(--acs);color:var(--ac);}
body.dark .et-sep{background:var(--bd);}
body.dark .et-select{background:var(--bg);color:var(--t1);border-color:var(--bd);}
body.dark .wc-bar{background:var(--surface);border-color:var(--bd);}
body.dark .fr-bar{background:var(--surface);border-color:var(--bd);}
body.dark .fr-bar input{background:var(--bg);color:var(--t1);border-color:var(--bd);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;height:100vh;overflow:hidden;font-size:13px;line-height:1.55;transition:background 0.25s,color 0.25s;}

/* SIDEBAR */
#sb{width:252px;min-width:252px;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;transition:width 0.25s;}
#sb.collapsed{width:0;min-width:0;}
.sbh{padding:20px 20px 14px;border-bottom:1px solid var(--bdi);}
.sblogo{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.lm{width:30px;height:30px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.sbt{font-size:15px;font-weight:600;color:var(--ti);letter-spacing:-0.015em;}
.sbver{font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:rgba(91,124,221,0.8);background:rgba(91,124,221,0.15);border-radius:4px;padding:1px 6px;margin-left:4px;vertical-align:middle;}
.sbs{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ti3);margin-top:2px;}
.sbnav{padding:10px 12px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.nsl{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--ti3);padding:10px 8px 4px;}
.nb{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r1);background:transparent;border:none;color:var(--ti2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background 0.15s,color 0.15s;text-align:left;width:100%;}
.nb:hover{background:var(--pnav);color:var(--ti);}
.nb.on{background:var(--pnav-on);color:var(--ti);}
.nb svg{opacity:0.6;flex-shrink:0;}
.nb.on svg,.nb:hover svg{opacity:1;}
.nba{margin-left:auto;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ti2);flex-shrink:0;}
.nb:hover .nba,.nb.on .nba{background:rgba(255,255,255,0.18);color:var(--ti);}
.sbf{padding:12px;border-top:1px solid var(--bdi);display:flex;flex-direction:column;gap:6px;}
.divi{height:1px;background:var(--bdi);margin:4px 0;}

/* UPLOAD */
.upz{border:1.5px dashed rgba(255,255,255,0.15);border-radius:var(--r1);padding:12px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s;position:relative;}
.upz:hover,.upz.drag{border-color:var(--ac);background:rgba(91,124,221,0.08);}
.upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--bd);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--s1);gap:12px;}
.tbt{font-size:15px;font-weight:600;letter-spacing:-0.015em;white-space:nowrap;}
.tbr{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;}
#content{flex:1;overflow-y:auto;padding:22px 26px;}

/* SEARCH */
.sw{position:relative;flex:1;max-width:360px;}
.si{width:100%;padding:8px 12px 8px 34px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);outline:none;transition:border-color 0.15s;}
.si:focus{border-color:var(--ac);background:var(--surface);}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;}
mark.hl{background:var(--hl);border-radius:2px;padding:0 1px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--s1);padding:20px;margin-bottom:18px;transition:box-shadow 0.2s;animation:fu 0.3s cubic-bezier(0.2,0,0,1) both;}
.card:hover{box-shadow:var(--s2);}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ct{font-size:14px;font-weight:600;letter-spacing:-0.01em;}
.ey{font-size:10.5px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.sc2{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;transition:box-shadow 0.2s,transform 0.2s;}
.sc2:hover{box-shadow:var(--s2);transform:translateY(-1px);}
.sv{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:5px;}
.sl{font-size:10.5px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);}
.sc2.ac .sv{color:var(--ac);}
.sc2.ok .sv{color:var(--ok);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity 0.15s,transform 0.1s;white-space:nowrap;}
.btn:hover{opacity:0.88;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.bp{background:var(--panel);color:var(--ti);}
.ba{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(91,124,221,0.3);}
.bs{background:var(--surface);color:var(--t1);border:1px solid var(--bd);}
.bg{background:transparent;color:var(--t2);border:1px dashed var(--bd);}
.bg:hover{background:var(--acs);color:var(--ac);border-color:var(--ac);}
.bsm{padding:5px 10px;font-size:12px;}
.bxs{padding:3px 8px;font-size:11px;}
.btn-icon{padding:6px;width:30px;height:30px;justify-content:center;border-radius:8px;}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r1);border:1px solid var(--bd);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--bg);position:sticky;top:0;z-index:1;}
th{padding:10px 12px;text-align:left;font-size:10.5px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--bd);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
tr.sm td{background:var(--warns);}
td[contenteditable]{outline:none;cursor:text;min-width:60px;transition:background 0.15s;}
td[contenteditable]:hover{background:var(--acs);}
td[contenteditable]:focus{background:var(--acs);box-shadow:inset 0 0 0 2px var(--ac);border-radius:4px;}
.cxb{width:36px;}
.dbt{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s,color 0.15s;padding:0;}
.dbt:hover{background:var(--errs);color:var(--err);}

/* TAGS / BADGES */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--rp);font-size:11px;font-weight:500;background:var(--neus);color:var(--t2);margin:1px 2px 1px 0;}
.ta{background:var(--acs);color:var(--ac);}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:var(--rp);font-size:10px;font-weight:600;padding:0 5px;background:var(--acs);color:var(--ac);}

/* FILTERS */
.fr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fs{padding:7px 28px 7px 10px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);cursor:pointer;outline:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B7585' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;}
.fs:focus{border-color:var(--ac);}

/* THREAD MAP */
.tr2{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.tl{width:100px;color:var(--t2);font-size:12px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.tcp{padding:2px 7px;border-radius:var(--rp);font-size:10px;font-weight:500;background:var(--neus);color:var(--t3);font-family:'DM Mono',monospace;border:1px solid var(--bd);}
.tcp.on{background:var(--acs);color:var(--ac);border-color:rgba(91,124,221,0.2);}

/* CHAR / LOC CARDS */
.chcard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:10px;animation:fu 0.25s cubic-bezier(0.2,0,0,1) both;}
.chn{font-size:14px;font-weight:600;margin-bottom:4px;}
.chb{font-size:12px;color:var(--t2);margin-bottom:10px;line-height:1.5;}
.act-t{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.act-r{display:flex;gap:8px;margin-bottom:5px;font-size:12px;}
.act-c{font-family:'DM Mono',monospace;font-size:11px;color:var(--ac);background:var(--acs);padding:1px 7px;border-radius:var(--rp);flex-shrink:0;align-self:flex-start;margin-top:1px;}

/* ═══════════════════════════════════════════
   READ / EDITOR VIEW
═══════════════════════════════════════════ */
#content.read-mode{padding:0;overflow:hidden;display:flex;height:100%;flex-direction:column;}
.read-layout{display:flex;width:100%;height:100%;overflow:hidden;}

/* TOC */
.rtoc{width:220px;min-width:220px;border-right:1px solid var(--bd);overflow-y:auto;background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;}
.rtoc-h{padding:10px 12px 6px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rtoc-t{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--t3);}
.rtoc-add{width:22px;height:22px;border-radius:6px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.12s,color 0.12s;}
.rtoc-add:hover{background:var(--acs);color:var(--ac);}
.rtoc-body{flex:1;overflow-y:auto;padding:4px 0;}
.ti2b{display:flex;align-items:center;gap:6px;padding:7px 12px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:12px;color:var(--t2);transition:background 0.12s;line-height:1.4;position:relative;}
.ti2b:hover{background:var(--bg);color:var(--t1);}
.ti2b.on{background:var(--acs);color:var(--ac);font-weight:600;}
.ti2b.on .tinum{color:var(--ac);}
.tinum{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);flex-shrink:0;width:22px;}
.toc-actions{display:none;gap:2px;margin-left:auto;flex-shrink:0;}
.ti2b:hover .toc-actions{display:flex;}
.toc-act-btn{width:18px;height:18px;border-radius:4px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;padding:0;transition:background 0.1s,color 0.1s;}
.toc-act-btn:hover{background:var(--bd);color:var(--t1);}
.toc-act-btn.del:hover{background:var(--errs);color:var(--err);}
.toc-hldot{font-size:9px;color:var(--ac);}

/* EDITOR SHELL */
.editor-shell{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* EDITOR TOOLBAR */
.editor-toolbar{background:var(--editor-bar);border-bottom:1px solid var(--editor-bar-bd);padding:5px 12px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;flex-shrink:0;position:relative;z-index:10;}
.etbtn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;border-radius:6px;background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:background 0.1s,color 0.1s;flex-shrink:0;}
.etbtn:hover{background:var(--neus);color:var(--t1);}
.etbtn.active{background:var(--acs);color:var(--ac);}
.etbtn-wide{width:auto;padding:0 8px;font-size:11px;}
.et-sep{width:1px;height:20px;background:var(--bd);margin:0 3px;flex-shrink:0;}
.et-select{padding:3px 22px 3px 7px;border-radius:6px;border:1px solid var(--bd);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:11px;color:var(--t1);outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%236B7585' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center;height:28px;}
.et-select:focus{border-color:var(--ac);}
.et-color-btn{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;position:relative;padding:0;flex-shrink:0;}
.et-color-btn:hover{background:var(--neus);}
.et-color-btn input[type="color"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;padding:0;border:none;}
.et-color-preview{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);pointer-events:none;}

/* WORD COUNT BAR */
.wc-bar{background:var(--surface);border-bottom:1px solid var(--bd);padding:4px 16px;display:flex;align-items:center;gap:12px;font-size:11px;color:var(--t3);flex-shrink:0;font-family:'DM Mono',monospace;}
.wc-item{display:flex;align-items:center;gap:4px;}
.wc-item strong{color:var(--t2);font-weight:600;}
.wc-dot{width:3px;height:3px;border-radius:50%;background:var(--bd);}
.autosave-status{margin-left:auto;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;transition:opacity 0.3s;}
.autosave-status.saving{color:var(--warn);}
.autosave-status.saved{color:var(--ok);}

/* FIND & REPLACE BAR */
.fr-bar{background:var(--surface);border-bottom:1px solid var(--bd);padding:6px 14px;display:none;align-items:center;gap:8px;flex-shrink:0;animation:fu 0.2s ease;}
.fr-bar.vis{display:flex;}
.fr-bar label{font-size:11px;color:var(--t3);white-space:nowrap;width:50px;}
.fr-bar input{padding:5px 10px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--t1);outline:none;width:160px;}
.fr-bar input:focus{border-color:var(--ac);}
.fr-matches{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;white-space:nowrap;}
.fr-close{margin-left:auto;width:22px;height:22px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.fr-close:hover{background:var(--bd);color:var(--t1);}

/* EDITOR BODY */
.editor-body{flex:1;overflow-y:auto;position:relative;padding:20px;}
.rprose{
  font-size:15px;line-height:1.9;color:#000;background:#fff;
  font-family:'DM Sans',sans-serif;max-width:816px;margin:0 auto 20px auto;
  padding:96px;min-height:1056px;box-shadow:var(--s2);border:1px solid var(--bd);
  word-break:break-word;outline:none;border-radius:4px;
}
body.dark .rprose {
  background:#181C23;color:var(--t1);border-color:rgba(255,255,255,0.08);
}
.chapter-heading-wrap{padding:0;max-width:100%;margin:0 0 16px 0;}
.chapter-heading-input{font-size:24px;font-weight:700;letter-spacing:-0.02em;border:none;outline:none;background:transparent;color:inherit;width:100%;font-family:'DM Sans',sans-serif;line-height:1.3;padding:0;}
.chapter-heading-input::placeholder{color:var(--t3);}
.chapter-meta{display:flex;gap:8px;flex-wrap:wrap;padding:0 0 24px;max-width:100%;margin:0 auto;border-bottom:1px solid var(--bd);margin-bottom:24px;}

.rprose:focus-visible{outline:none;}
.rprose p{margin-bottom:0.9em;}
.rprose h1,.rprose h2,.rprose h3{font-weight:700;letter-spacing:-0.02em;margin:1.2em 0 0.5em;}
.rprose h1{font-size:24px;}
.rprose h2{font-size:20px;}
.rprose h3{font-size:17px;}
.rprose ul,.rprose ol{padding-left:1.6em;margin-bottom:0.9em;}
.rprose li{margin-bottom:0.3em;}
.rprose blockquote{border-left:3px solid var(--ac);padding-left:16px;color:var(--t2);font-style:italic;margin:1em 0;}
.rprose hr{border:none;border-top:1px solid var(--bd);margin:1.5em 0;}
.rprose a{color:var(--ac);text-decoration:underline;}
.rprose img{max-width:100%;border-radius:8px;}

/* EDITOR NAV */
.editor-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--bd);background:var(--surface);flex-shrink:0;max-width:816px;margin:0 auto;width:100%;border-radius:4px;box-shadow:var(--s1);}

/* Focus mode */
body.focus-mode .rtoc,
body.focus-mode .rright,
body.focus-mode .editor-toolbar,
body.focus-mode .wc-bar,
body.focus-mode .topbar,
body.focus-mode #sb{opacity:0;pointer-events:none;transition:opacity 0.4s;}
body.focus-mode .editor-shell{background:var(--bg);}
body.focus-mode:hover .rtoc,
body.focus-mode:hover .editor-toolbar,
body.focus-mode:hover .wc-bar,
body.focus-mode:hover .topbar{opacity:1;pointer-events:all;}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(31,35,40,0.55);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fi 0.2s ease;}
.mo{background:var(--surface);border-radius:var(--r3);box-shadow:var(--s3);width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:28px;animation:fu 0.3s cubic-bezier(0.2,0,0,1);}
.mot{font-size:17px;font-weight:600;letter-spacing:-0.02em;margin-bottom:4px;}
.mos{font-size:12px;color:var(--t2);margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:block;}
.fi2{width:100%;padding:9px 12px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);outline:none;transition:border-color 0.15s;}
.fi2:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,124,221,0.12);}
textarea.fi2{resize:vertical;min-height:70px;line-height:1.5;}
.fi2[type="password"]{font-family:'DM Mono',monospace;}
.fsel{width:100%;padding:9px 12px;border-radius:var(--r1);border:1px solid var(--bd);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface);color:var(--t1);outline:none;cursor:pointer;}
.fsel:focus{border-color:var(--ac);}
.ae{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.ae input:first-child{width:80px;flex-shrink:0;}
.ae input:last-child{flex:1;}
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.pb{padding:10px 12px;border-radius:var(--r1);border:1.5px solid var(--bd);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:border-color 0.15s;text-align:left;color:var(--t1);}
.pb:hover{border-color:var(--ac);background:var(--acs);}
.pb.on{border-color:var(--ac);background:var(--acs);color:var(--ac);}
.pd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle;}
.mof{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);}

/* TOAST */
#tc{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--panel);color:var(--ti);padding:10px 16px;border-radius:var(--r1);font-size:13px;font-weight:500;box-shadow:var(--s3);display:flex;align-items:center;gap:8px;animation:fu 0.3s cubic-bezier(0.2,0,0,1) both;pointer-events:all;min-width:220px;}
.toast.ok::before,.toast.er::before,.toast.in::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.toast.ok::before{background:var(--ok);}
.toast.er::before{background:var(--err);}
.toast.in::before{background:var(--ac);}

/* MISC */
.cr{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{padding:4px 10px;border-radius:var(--rp);font-size:11px;font-weight:500;background:var(--neus);color:var(--t2);border:1px solid var(--bd);}
.es{text-align:center;padding:40px 20px;}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--neu);border-radius:99px;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes so{to{opacity:0;transform:translateX(16px);}}

/* ── HIGHLIGHT SYSTEM ── */
.hspan{border-radius:3px;cursor:pointer;transition:box-shadow .15s;}
.hspan:hover{box-shadow:0 0 0 2px rgba(0,0,0,0.18);}

/* Floating toolbar */
#hltb{position:fixed;z-index:500;display:none;
  background:#1F2328;border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.28),0 2px 8px rgba(0,0,0,0.18);
  padding:8px 10px;gap:7px;align-items:center;flex-wrap:wrap;min-width:260px;}
#hltb.vis{display:flex;}
.htsw{width:22px;height:22px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.12);
  cursor:pointer;flex-shrink:0;transition:transform .15s,border-color .15s;}
.htsw:hover,.htsw.sel{transform:scale(1.3);border-color:rgba(255,255,255,0.7);}
.htdiv{width:1px;height:20px;background:rgba(255,255,255,0.12);flex-shrink:0;}
#htag{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);
  border-radius:7px;color:#fff;font-size:11px;font-family:'DM Sans',sans-serif;
  padding:5px 9px;width:100px;outline:none;}
#htag::placeholder{color:rgba(255,255,255,0.35);}
#htag:focus{border-color:#5B7CDD;}
#htsave{background:#5B7CDD;color:#fff;border:none;border-radius:7px;
  font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;}
#htsave:hover{background:#4a6ac8;}
#htcancel{background:transparent;color:rgba(255,255,255,0.5);border:none;
  font-size:18px;line-height:1;cursor:pointer;padding:0 3px;}

/* RIGHT PANEL */
.rright{width:270px;min-width:270px;border-left:1px solid var(--bd);
  background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;}
.rrh{padding:12px 14px 10px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rrt{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
.rrsearch{padding:6px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.rrsearch input{width:100%;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);
  background:var(--bg);font-size:11px;font-family:'DM Sans',sans-serif;color:var(--t1);outline:none;}
.rrsearch input:focus{border-color:var(--ac);}
.rrlist{flex:1;overflow-y:auto;padding:8px;}

/* Highlight cards */
.hlcard{background:var(--bg);border:1px solid var(--bd);border-radius:10px;
  padding:10px 12px 10px 14px;margin-bottom:8px;cursor:pointer;
  position:relative;transition:border-color .15s,box-shadow .15s;}
.hlcard:hover{border-color:var(--ac);box-shadow:var(--s2);}
.hlcard-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px;}
.hlcard-txt{font-size:12px;line-height:1.6;color:var(--t1);margin-bottom:5px;word-break:break-word;}
.hlcard-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.hlcard-ch{font-size:10px;font-family:'DM Mono',monospace;color:var(--ac);background:var(--acs);padding:1px 7px;border-radius:99px;}
.hlcard-tag{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--neus);color:var(--t2);cursor:pointer;}
.hlcard-tag:hover{background:var(--acs);color:var(--ac);}
.hlcard-del{position:absolute;right:5px;top:5px;width:20px;height:20px;
  border-radius:5px;background:transparent;border:none;color:var(--t3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .12s,background .12s;}
.hlcard:hover .hlcard-del{opacity:1;}
.hlcard-del:hover{background:var(--errs);color:var(--err);}

/* COMPARE VIEW */
.cmpgrid{display:grid;grid-template-columns:1fr 1fr;height:100%;overflow:hidden;}
.cmppane{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd);}
.cmppane:last-child{border-right:none;}
.cmphead{padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--surface);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cmpbody{flex:1;overflow-y:auto;padding:24px 28px;font-size:14px;line-height:1.9;
  color:var(--t1);font-family:'DM Sans',sans-serif;word-break:break-word;}
.cmpbody .hspan{display:inline;border-radius:3px;cursor:pointer;padding:1px 0;}
.cmp-legend{display:flex;flex-wrap:wrap;gap:5px;padding:6px 16px;
  border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0;}
.cmp-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;
  color:var(--t2);padding:2px 7px;border-radius:99px;border:1px solid var(--bd);background:var(--surface);}
.cmp-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cmpsel{background:var(--bg);border:1px solid var(--bd);border-radius:8px;
  font-size:12px;font-weight:500;color:var(--t1);padding:5px 26px 5px 10px;
  cursor:pointer;outline:none;font-family:'DM Sans',sans-serif;appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B7585' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;}
.cmpsel:focus{border-color:var(--ac);}

/* Panel toggle */
.hltoggle{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;
  border-radius:8px;background:var(--bg);border:1px solid var(--bd);
  cursor:pointer;font-size:11px;font-weight:500;color:var(--t2);
  transition:background .12s,color .12s,border-color .12s;}
.hltoggle:hover,.hltoggle.on{background:var(--acs);color:var(--ac);border-color:rgba(91,124,221,.3);}
.toc-hldot{font-size:9px;color:var(--ac);margin-left:auto;flex-shrink:0;}

/* Theme cards */
.theme-card{border:2px solid var(--bd);border-radius:var(--r2);padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.theme-card:hover{border-color:var(--ac);box-shadow:var(--s1);}
.theme-card.theme-on{border-color:var(--ac);box-shadow:0 0 0 3px var(--acs);}
.theme-check{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}

/* Sidebar toggle */
.sb-toggle{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s,color 0.1s;flex-shrink:0;}
.sb-toggle:hover{background:var(--bd);color:var(--t1);}

/* ── FIX ENGINE ── */
.fix-log{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r1);max-height:320px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;padding:12px 14px;}
.fix-log-item{display:flex;gap:10px;padding:3px 0;border-bottom:1px solid var(--bd);}
.fix-log-item:last-child{border-bottom:none;}
.fln{color:var(--t3);min-width:34px;}
.fls.ok{color:var(--ok);}
.fls.sk{color:var(--t3);}
.fls.er{color:var(--err);}
.fld{color:var(--t1);flex:1;word-break:break-word;}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.how-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;text-align:center;}
.how-n{width:30px;height:30px;border-radius:50%;background:var(--ac);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
.how-t{font-size:12px;font-weight:600;margin-bottom:3px;}
.how-d{font-size:11px;color:var(--t2);line-height:1.5;}
.step{display:flex;gap:10px;padding:9px 12px;border-radius:var(--r1);border:1px solid var(--bd);background:var(--bg);font-size:12px;line-height:1.6;margin-bottom:6px;}
.stepn{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);min-width:18px;padding-top:1px;}
.prov-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:var(--r1);border:2px solid var(--bd);background:var(--bg);cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color .15s,background .15s;}
.prov-btn.sel{background:var(--acs);}
.prov-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.prov-lbl{font-size:10px;font-weight:600;color:var(--t1);white-space:nowrap;}
</style>
</head>
<body>

<div id="sb">
  <div class="sbh">
    <div class="sblogo">
      <div class="lm">DF</div>
      <div>
        <div class="sbt">DRE Flow <span class="sbver">4.5</span></div>
        <div class="sbs">Story Intelligence</div>
      </div>
    </div>
  </div>
  <div class="sbnav">
    <div class="nsl">Views</div>
    <button class="nb on" id="nb-dashboard" onclick="showView('dashboard')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="8" y="1" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="1" y="8" width="5" height="5" rx="1.5" fill="currentColor"/><rect x="8" y="8" width="5" height="5" rx="1.5" fill="currentColor"/></svg>
      Dashboard
    </button>
    <button class="nb" id="nb-timeline" onclick="showView('timeline')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M1 7h12M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Timeline
      <span class="badge" id="bdg-event" style="margin-left:auto">0</span>
    </button>
    <button class="nb" id="nb-read" onclick="showView('read')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h10v10H2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M4 5h6M4 7h6M4 9h4" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
      Read &amp; Edit
      <span class="badge" id="bdg-read" style="margin-left:auto">0</span>
    </button>
    <button class="nb" id="nb-characters" onclick="showView('characters')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 12c0-2.761 2.239-5 5-5s5 2.239 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Characters
      <span class="badge" id="bdg-char" style="margin-left:auto">0</span>
      <span class="nba" onclick="event.stopPropagation();openAddChar()">+</span>
    </button>
    <button class="nb" id="nb-highlights" onclick="showView('highlights')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 11l1.5-4.5L10 2l2 2-6.5 4.5L2 11z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8 4l2 2" stroke="currentColor" stroke-width="1.25"/></svg>
      Highlights
      <span class="badge" id="bdg-hl" style="margin-left:auto">0</span>
    </button>
    <button class="nb" id="nb-locations" onclick="showView('locations')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1C4.791 1 3 2.791 3 5c0 3.5 4 8 4 8s4-4.5 4-8c0-2.209-1.791-4-4-4z" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="5" r="1.5" stroke="currentColor" stroke-width="1.25"/></svg>
      Locations
      <span class="badge" id="bdg-loc" style="margin-left:auto">0</span>
      <span class="nba" onclick="event.stopPropagation();openAddLoc()">+</span>
    </button>
    <button class="nb" id="nb-fixengine" onclick="showView('fixengine')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M7 4v3l2 2" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
      Fix Engine
    </button>
    <button class="nb" id="nb-settings" onclick="showView('settings')">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.2" stroke="currentColor" stroke-width="1.4"/><path d="M7 1.5v1M7 11.5v1M1.5 7h1M11.5 7h1M3.1 3.1l.7.7M10.2 10.2l.7.7M10.2 3.1l-.7.7M3.1 10.2l.7.7" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
      Settings
    </button>
    <div class="divi" style="margin:8px 0;"></div>
    <div class="nsl">Import Manuscript</div>
    <button class="btn ba" onclick="openPasteModal()" style="width:100%;justify-content:center;font-size:12px;">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 3V2a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.5"/></svg>
      Paste Manuscript Text
    </button>
    <button class="btn" id="gdoc-btn" onclick="openGDocsModal()" style="width:100%;justify-content:center;font-size:12px;background:var(--surface);color:var(--t1);border:1px solid var(--bd);">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="#4285F4" stroke-width="2" stroke-linejoin="round"/><path d="M14 2v6h6" stroke="#4285F4" stroke-width="2" stroke-linejoin="round"/><path d="M8 13h8M8 17h5" stroke="#4285F4" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span id="gdoc-btn-label">Open from Google Docs</span>
    </button>
    <input type="file" id="fileInput" accept=".txt,.docx" style="display:none">
    <button class="btn bs" onclick="document.getElementById('fileInput').click()" style="width:100%;justify-content:center;font-size:11px;color:var(--ti3);border-color:var(--bdi);background:transparent;">
      or try file upload
    </button>
    <div id="ai-ind" style="display:none;padding:10px 12px;border-radius:var(--r1);background:rgba(91,124,221,0.1);border:1px solid rgba(91,124,221,0.2);margin-top:8px;">
      <div id="ai-lbl" style="font-size:11px;color:var(--ac);font-weight:600;margin-bottom:6px;">Analyzing…</div>
      <div style="height:3px;background:rgba(91,124,221,0.15);border-radius:99px;overflow:hidden;"><div id="ai-bar" style="height:100%;background:var(--ac);border-radius:99px;width:0%;transition:width 0.4s ease;"></div></div>
      <div id="ai-ctr" style="font-size:10px;color:var(--ti3);margin-top:5px;font-family:'DM Mono',monospace;"></div>

    <button class="btn ba" onclick="addEvent()" style="width:100%;justify-content:center;">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Add Timeline Event
    </button>
    <div style="display:flex;gap:6px;">
      <button class="btn bs" onclick="saveP()" style="flex:1;justify-content:center;font-size:12px;">Save</button>
      <button class="btn bs" onclick="loadP()" style="flex:1;justify-content:center;font-size:12px;">Load</button>
    </div>

      <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="2.2" stroke="currentColor" stroke-width="1.4"/><path d="M7 1.5v1M7 11.5v1M1.5 7h1M11.5 7h1" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/></svg>
      Settings
    </button>

</div>

<div id="main">

<script>
// ── STATE ─────────────────────────────────────────
var events     = [];

var highlights = [];
var fixLog     = [];

var curView    = 'dashboard';

var chfilt     = '';
var srch       = '';

var hlPanelOn  = true;
var hlColor    = 'yellow';
var hlPending  = null;

// Editor state

var edFindMatches = [];

// ── PROVIDERS ─────────────────────────────────────

};

// ── HELPERS ───────────────────────────────────────
function uid(){ return Math.random().toString(36).slice(2,10); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escPreserve(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function hl(text, term){
  if (!term || !text) return esc(text);
  var escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(String(text)).replace(new RegExp('('+escaped+')','gi'),'<mark class="hl">$1</mark>');
}
function allCharNames(){
  var s = new Set();
  events.forEach(function(e){ if(e.characters) e.characters.split(',').forEach(function(c){ var t=c.trim(); if(t) s.add(t); }); });
  chars.forEach(function(c){ s.add(c.name); });
  return s;
}
function allLocNames(){
  var s = new Set();
  events.forEach(function(e){ if(e.location && e.location.trim()) s.add(e.location.trim()); });
  locs.forEach(function(l){ s.add(l.name); });
  return s;
}
function getChaps(){
  var s = new Set();
  events.forEach(function(e){ if(e.chapter!==undefined && e.chapter!=='') s.add(String(e.chapter).trim()); });
  return s;
}
function readableEvents(){ return events.filter(function(e){ return e.fullText; }); }
function threadMap(){
  var map = {};
  var allCh = Array.from(getChaps()).sort(function(a,b){ return parseInt(a)-parseInt(b); });
  events.forEach(function(e){
    if (!e.characters) return;
    e.characters.split(',').forEach(function(c){
      var n = c.trim(); if(!n) return;
      if (!map[n]) map[n] = new Set();
      if (e.chapter!==undefined && e.chapter!=='') map[n].add(String(e.chapter).trim());
    });
  });
  chars.forEach(function(ch){
    if (!map[ch.name]) map[ch.name] = new Set();
    if (ch.activity) ch.activity.forEach(function(a){ if(a.chapter) map[ch.name].add(String(a.chapter).trim()); });
  });
  return { map:map, allCh:allCh };
}

// ── SIDEBAR ───────────────────────────────────────
function toggleSidebar(){
  sidebarOpen = !sidebarOpen;
  document.getElementById('sb').classList.toggle('collapsed', !sidebarOpen);
}

// ── SEARCH ────────────────────────────────────────
var _matchIdx = 0;
function doSearch(v){
  srch = v.trim().toLowerCase();
  _matchIdx = 0;
  renderView();
  var marks = document.querySelectorAll('mark.hl');
  var el = document.getElementById('scnt');
  if (!srch){ el.textContent=''; }
  else if (marks.length){ el.textContent=marks.length+' match'+(marks.length!==1?'es':''); if(curView==='read'&&marks[0]) marks[0].scrollIntoView({behavior:'smooth',block:'center'}); }
  else { el.textContent='no matches'; }
}
function stepMatch(dir){
  var marks = document.querySelectorAll('mark.hl');
  if (!marks.length) return;
  _matchIdx = ((_matchIdx+dir)%marks.length+marks.length)%marks.length;
  marks.forEach(function(m){ m.style.outline=''; });
  marks[_matchIdx].scrollIntoView({behavior:'smooth',block:'center'});
  marks[_matchIdx].style.outline = '2px solid #E05C5C';
  document.getElementById('scnt').textContent = (_matchIdx+1)+' / '+marks.length;
}
function applySearchMarks(el, term){
  if(!term||!el) return;
  var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
  var nodes = []; while(walker.nextNode()) nodes.push(walker.currentNode);
  var escaped = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re = new RegExp('('+escaped+')','gi');
  nodes.forEach(function(n){
    if(n.nodeValue.match(re)){
      var temp = document.createElement('span');
      temp.innerHTML = esc(n.nodeValue).replace(re,'<mark class="hl">$1</mark>');
      while(temp.firstChild) n.parentNode.insertBefore(temp.firstChild, n);
      n.parentNode.removeChild(n);
    }
  });
}

// ── ROUTING ───────────────────────────────────────
function showView(v){
  var c = document.getElementById('content');
  c.className='';
  if(v !== 'read') document.onkeydown = null;
  curView = v;
  document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
  var btn = document.getElementById('nb-'+v);
  if (btn) btn.classList.add('on');
  var titles = {dashboard:'Dashboard',timeline:'Timeline',read:'Read & Edit',characters:'Characters',locations:'Locations',highlights:'Highlights',compare:'Compare Chapters',fixengine:'Fix Engine',settings:'Settings'};
  document.getElementById('vt').textContent = titles[v]||v;
  renderView();
}
function renderView(){
  var c = document.getElementById('content');
  if      (curView==='dashboard')  renderDash(c);
  else if (curView==='timeline')   renderTL(c);
  else if (curView==='read')       renderRead(c);
  else if (curView==='characters') renderChars(c);
  else if (curView==='locations')  renderLocs(c);
  else if (curView==='highlights') renderHLView(c);
  else if (curView==='compare')    renderCompare(c);
  else if (curView==='fixengine')  renderFixEngine(c);
  else if (curView==='settings')   renderSettings(c);
  updateBadges();
}
function jumpCh(idx){
  readIdx = idx;
  showView('read');
}

    var sorted=Object.entries(tm.map).sort(function(a,b){return b[1].size-a[1].size;});
    sorted.forEach(function(entry){
      var name=entry[0], chapSet=entry[1];

    html+='<p style="color:var(--t2);font-size:12px;">Drop a .docx or .txt in the sidebar, or paste your text.</p></div></div>';

// ── TIMELINE ──────────────────────────────────────
function renderTL(c){
  var cn=allCharNames(), chaps=getChaps();

          '<input class="chapter-heading-input" id="ch-heading" value="'+esc(cur.heading||'Chapter '+cur.chapter)+'" placeholder="Chapter title…" onchange="saveChapterHeading(this.value)" oninput="saveChapterHeading(this.value)">'+

    '</div>';

  var panelHtml='';

      '<div class="rrh"><span class="rrt">Highlights</span>'+

  }

  var prose=document.getElementById('rproseEl');
  if(prose){
    applySearchMarks(prose,srch);
    prose.addEventListener('mouseup',onProseSelect);
    prose.addEventListener('touchend',onProseSelect);
    prose.addEventListener('click',function(e){
      var t=e.target.closest('.hspan');
      if(t&&t.dataset.hlid) openHLEdit(t.dataset.hlid);
    });
    prose.addEventListener('keyup', updateToolbarState);
    prose.addEventListener('mouseup', updateToolbarState);
  }

  updateToolbarState();
  renderRRPanel();

  document.onkeydown = function(e){
    var tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    var isEditable = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;
    if(isEditable) return;
    if((e.ctrlKey||e.metaKey)&&(e.key==='h'||e.key==='f')){
      e.preventDefault(); toggleFindReplace();
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); execEdCmd('undo'); }
    if((e.ctrlKey||e.metaKey)&&e.key==='y'){ e.preventDefault(); execEdCmd('redo'); }
    if(e.key==='Escape'&&edFocusMode){ toggleFocusMode(); }
  };
}

// ── FIND & REPLACE ────────────────────────────────
function toggleFindReplace(){
  edFindActive=!edFindActive;
  var bar=document.getElementById('fr-bar');
  if(!bar) return;
  bar.classList.toggle('vis',edFindActive);
  if(edFindActive){ setTimeout(function(){var f=document.getElementById('fr-find');if(f)f.focus();},80); }
  else { clearFindHighlights(); document.getElementById('fr-matches').textContent=''; }
}
function edFindExec(){
  var prose=document.getElementById('rproseEl');
  if(!prose) return;
  clearFindHighlights();
  var term=(document.getElementById('fr-find').value||'').trim();
  var matchEl=document.getElementById('fr-matches');
  if(!term){ matchEl.textContent=''; return; }
  var walker=document.createTreeWalker(prose,NodeFilter.SHOW_TEXT,null,false);
  var nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
  var escaped=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp('('+escaped+')','gi');
  var count=0;
  nodes.forEach(function(n){
    if(n.nodeValue.match(re)){
      var temp=document.createElement('span');
      temp.innerHTML=n.nodeValue.replace(re,function(m){ count++; return '<mark class="fr-hl" style="background:#FFD700;border-radius:2px;padding:0 1px;">'+esc(m)+'</mark>'; });
      while(temp.firstChild) n.parentNode.insertBefore(temp.firstChild,n);
      n.parentNode.removeChild(n);
    }
  });
  edFindMatches=Array.from(prose.querySelectorAll('mark.fr-hl'));
  edFindIdx=0;
  matchEl.textContent=count?count+' match'+(count!==1?'es':''):'no matches';
  if(edFindMatches.length) edFindScrollTo(0);
}
function edFindStep(dir){
  if(!edFindMatches.length) return;
  edFindMatches.forEach(function(m){m.style.outline='';});
  edFindIdx=((edFindIdx+dir)%edFindMatches.length+edFindMatches.length)%edFindMatches.length;
  edFindScrollTo(edFindIdx);
  document.getElementById('fr-matches').textContent=(edFindIdx+1)+' / '+edFindMatches.length;
}
function edFindScrollTo(i){
  var m=edFindMatches[i]; if(!m) return;
  m.scrollIntoView({behavior:'smooth',block:'center'});
  m.style.outline='2px solid #E05C5C';
}
function clearFindHighlights(){
  var prose=document.getElementById('rproseEl');
  if(!prose) return;
  prose.querySelectorAll('mark.fr-hl').forEach(function(m){
    var p=m.parentNode; while(m.firstChild) p.insertBefore(m.firstChild,m); p.removeChild(m);
  });
  edFindMatches=[]; edFindIdx=0;
}
function edReplaceOne(){
  var term=document.getElementById('fr-find').value.trim();
  var repl=document.getElementById('fr-replace').value;
  if(!term||!edFindMatches.length) return;
  var cur=edFindMatches[edFindIdx];
  if(cur){ cur.outerHTML=esc(repl); }
  onProseInput();
  edFindExec();
}
function edReplaceAll(){
  var term=document.getElementById('fr-find').value.trim();
  var repl=document.getElementById('fr-replace').value;
  if(!term) return;
  var prose=document.getElementById('rproseEl');
  if(!prose) return;
  clearFindHighlights();
  var count=0;
  var walker=document.createTreeWalker(prose,NodeFilter.SHOW_TEXT,null,false);
  var nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
  var escaped=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  var re=new RegExp(escaped,'gi');
  nodes.forEach(function(n){
    if(n.nodeValue.match(re)){
      var newVal=n.nodeValue.replace(re,function(){ count++; return repl; });
      n.nodeValue=newVal;
    }
  });
  onProseInput();
  document.getElementById('fr-matches').textContent=count+' replaced';
  toast(count+' replacement'+(count!==1?'s':''),'ok');
}

// ── WORD COUNT ────────────────────────────────────
function getWordCount(html){
  var txt=html.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
  var words=txt?txt.split(/\s+/).length:0;
  var chars=txt.length;
  var time=Math.max(1,Math.round(words/200));
  return {words:words,chars:chars,time:time};
}
function updateWordCount(){
  var prose=document.getElementById('rproseEl');
  if(!prose) return;
  var wc=getWordCount(prose.innerHTML);
  var ww=document.getElementById('wc-words'), wc2=document.getElementById('wc-chars'), wt=document.getElementById('wc-time');
  if(ww) ww.textContent=wc.words;
  if(wc2) wc2.textContent=wc.chars;
  if(wt) wt.textContent=wc.time;
}

// ── CHAPTER OPERATIONS ────────────────────────────
function saveChapterHeading(val){
  var readable=readableEvents();
  if(readable[readIdx]) readable[readIdx].heading=val.trim();
  debouncedSaveProseEdit();
}
function addChapter(){
  var idx=events.findIndex(function(e){return e===readableEvents()[readIdx]});
  var newEv={id:uid(),chapter:readableEvents().length+1,heading:'New Chapter',event:'',characters:'',location:'',notes:'',fullText:'<p>Start writing here…</p>'};
  if(idx>-1) events.splice(idx+1,0,newEv); else events.push(newEv);
  readIdx=readableEvents().findIndex(function(e){return e===newEv;});
  if(readIdx<0) readIdx=readableEvents().length-1;
  renderRead(document.getElementById('content'));
  updateBadges();
  toast('Chapter added','ok');
  setTimeout(function(){ var h=document.getElementById('ch-heading'); if(h){h.focus();h.select();} },200);
}
function deleteChapter(tocIdx){
  var readable=readableEvents();
  var ev=readable[tocIdx];
  if(!ev) return;
  if(!confirm('Delete "'+( ev.heading||'this chapter')+'"? This cannot be undone.')) return;
  var evIdx=events.indexOf(ev);
  if(evIdx>-1) events.splice(evIdx,1);
  if(readIdx>=readable.length-1) readIdx=Math.max(0,readable.length-2);
  renderRead(document.getElementById('content'));
  updateBadges();
  toast('Chapter deleted','in');
}
function moveChapter(tocIdx, dir){
  var readable=readableEvents();
  var ev=readable[tocIdx];
  var swapEv=readable[tocIdx+dir];
  if(!ev||!swapEv) return;
  var ia=events.indexOf(ev), ib=events.indexOf(swapEv);
  if(ia<0||ib<0) return;
  var tmp=events[ia]; events[ia]=events[ib]; events[ib]=tmp;
  if(readIdx===tocIdx) readIdx=tocIdx+dir;
  else if(readIdx===tocIdx+dir) readIdx=tocIdx;
  renderRead(document.getElementById('content'));
}
function exportChapter(){
  var readable=readableEvents(), cur=readable[readIdx];
  if(!cur){ toast('No chapter','er'); return; }
  var htmlData = '<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>' +
                 '<h1>'+esc(cur.heading||'Chapter '+cur.chapter)+'</h1>' + (cur.fullText||'') +
                 '</body></html>';
  var blob=new Blob(['\ufeff', htmlData],{type:'application/msword'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=(cur.heading||'chapter-'+cur.chapter)+'.doc'; a.click();
  URL.revokeObjectURL(url); toast('Chapter exported as .doc','ok');
}

// ── PROSE SAVE / AUTO-SAVE ────────────────────────
function onProseInput(){
  setAutosaveStatus('saving');
  updateWordCount();
  debouncedSaveProseEdit();
}
function setAutosaveStatus(state){
  var el=document.getElementById('autosave-status');
  if(!el) return;
  el.className='autosave-status '+state;
  el.innerHTML=state==='saving'?
    '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" style="animation:spin 0.8s linear infinite;transform-origin:center"/></svg> Saving…':
    '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Saved';
}
function saveProseEdit(){
  var prose=document.getElementById('rproseEl');
  if(!prose) return;
  var clone=prose.cloneNode(true);
  clone.querySelectorAll('mark.hl').forEach(function(m){
    var p=m.parentNode; while(m.firstChild) p.insertBefore(m.firstChild,m); p.removeChild(m);
  });
  clone.querySelectorAll('mark.fr-hl').forEach(function(m){
    var p=m.parentNode; while(m.firstChild) p.insertBefore(m.firstChild,m); p.removeChild(m);
  });
  var rd=readableEvents();
  if(rd[readIdx]) rd[readIdx].fullText=clone.innerHTML;
  setAutosaveStatus('saved');
  localStorage.setItem('dref5',JSON.stringify({events:events,chars:chars,locs:locs,highlights:highlights,fixLog:fixLog,fixStats:fixStats}));
}
function debouncedSaveProseEdit(){
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveProseEdit,600);
}

// ── TEXT SELECTION → HIGHLIGHT TOOLBAR ───────────
function onProseSelect(e){
  setTimeout(function(){
    var sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.rangeCount) return;
    var selText=sel.toString();
    if(!selText||selText.trim().length<1) return;
    var range=sel.getRangeAt(0);
    hlPending={range:range.cloneRange(),text:selText};
    var rect=range.getBoundingClientRect();
    var tb=document.getElementById('hltb');
    document.getElementById('htag').value='';
    document.querySelectorAll('.htsw').forEach(function(s){s.classList.remove('sel');});
    var selSw=document.querySelector('.htsw[data-c="'+hlColor+'"]');
    if(selSw) selSw.classList.add('sel');
    tb.classList.add('vis');
    var left=Math.max(8,Math.min(rect.left+window.scrollX,window.innerWidth-300));
    var top=rect.top+window.scrollY-58;
    if(top<8) top=rect.bottom+window.scrollY+8;
    tb.style.left=left+'px';
    tb.style.top=top+'px';
  },10);
}
function pickColor(c,el){
  hlColor=c;
  document.querySelectorAll('.htsw').forEach(function(s){s.classList.remove('sel');});
  if(el) el.classList.add('sel');
}
function closeHLToolbar(){
  document.getElementById('hltb').classList.remove('vis');
  hlPending=null;
  if(window.getSelection) window.getSelection().removeAllRanges();
}
function commitHL(){
  if(!hlPending||!hlPending.range){closeHLToolbar();return;}
  var txt=hlPending.text.trim();

        ' &ldquo;' + esc(f.find.substring(0, 55)) + (f.find.length > 55 ? '&hellip;' : '') + '&rdquo;<br>';
    });

function parseFixList(raw) {
  var fixes = [];
  var lines = raw.split('\n');
  var i = 0;
  while (i < lines.length) {
    var line = lines[i].trim();

    if (/^#\s*global/i.test(line)) {
      var gm = line.match(/["""'']([^"""'']+)["""'']\s*[→\->]+\s*["""'']([^"""'']*)["""'']/i);
      if (!gm) gm = line.match(/"([^"]+)"\s*[→\->]+\s*"([^"]*)"/i);
      if (gm) fixes.push({type:'global', global:true, find:gm[1], replace:gm[2]});
      i++; continue;
    }

    if (/^find:/i.test(line)) {
      var findText = line.replace(/^find:\s*/i, '');
      while (i + 1 < lines.length && !/^(replace:|find:|#)/i.test(lines[i+1].trim())) {
        i++;
        findText += '\n' + lines[i];
      }
      i++;
      if (i < lines.length && /^replace:/i.test(lines[i].trim())) {
        var replText = lines[i].trim().replace(/^replace:\s*/i, '');
        while (i + 1 < lines.length && !/^(replace:|find:|#)/i.test(lines[i+1].trim())) {
          i++;
          replText += '\n' + lines[i];
        }
        if (findText.trim()) fixes.push({type:'local', global:false, find:findText.trim(), replace:replText.trim()});
      }
      i++; continue;
    }

    var am = line.match(/^["""'']([^"""'']+)["""'']\s*[→\->]+\s*["""'']([^"""'']*)["""'']/);
    if (am && !/^#/.test(line)) {
      fixes.push({type:'local', global:false, find:am[1], replace:am[2]});
    }
    i++;
  }
  return fixes;
}

async function runFixes() {
  var raw = (document.getElementById('fix-input').value || '').trim();
  var preview = document.getElementById('preview-mode').checked;
  if (!raw) { toast('Paste your fix list first', 'er'); return; }
  var fixes = parseFixList(raw);
  if (!fixes.length) { toast('No valid fixes found — check format', 'er'); return; }
  closeModal();

  fixLog = [];
  fixStats = {applied:0, skipped:0, errors:0};
  var rd = readableEvents();

  var prog = document.getElementById('ai-ind');
  var bar = document.getElementById('ai-bar');
  var lbl = document.getElementById('ai-lbl');
  var ctr = document.getElementById('ai-ctr');
  if(prog) prog.style.display = 'block';
  if(bar) bar.style.width = '0%';

  var globalFixes = fixes.filter(function(f) { return f.global; });
  var localFixes  = fixes.filter(function(f) { return !f.global; });

  if (globalFixes.length) {
    if(lbl) lbl.textContent = 'Applying global replacements...';
    rd.forEach(function(chapter) {
      var text = chapter.fullText || '';
      globalFixes.forEach(function(f, fi) {
        var escaped = f.find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        var re = new RegExp(escaped, 'gi');
        var matches = (text.match(re) || []).length;
        if (matches > 0) {
          if (!preview) text = text.replace(re, f.replace);
          fixLog.push({num:fi+1, st:'ok', desc:(preview?'[PREVIEW] ':'') + 'GLOBAL "' + f.find + '" \u2192 "' + f.replace + '" (' + matches + ' in "' + (chapter.heading||'Ch.'+chapter.chapter) + '")'});
          fixStats.applied += matches;
        }
      });
      if (!preview) chapter.fullText = text;
    });
    if(bar) bar.style.width = '25%';
  }

  if (localFixes.length && rd.length) {
    var sys = 'You are a precise manuscript editor. Apply the listed corrections exactly.\n' +
      'Rules:\n' +
      '- Find the EXACT original text specified and replace it with the corrected version\n' +
      '- Preserve ALL surrounding text, HTML tags, and formatting exactly as-is\n' +
      '- Only change what is explicitly listed — nothing else\n' +
      '- Keep the author\'s voice, dialect, and intentional stylistic choices\n' +
      '- Return ONLY the corrected chapter HTML. No explanations, no markdown code fences.';

    for (var ci = 0; ci < rd.length; ci++) {
      var chapter = rd[ci];
      if(lbl) lbl.textContent = 'Chapter ' + (ci+1) + ' of ' + rd.length + ': ' + (chapter.heading||'Ch.'+chapter.chapter);
      if(ctr) ctr.textContent = (ci+1) + ' / ' + rd.length;
      if(bar) bar.style.width = Math.round(25 + (ci / rd.length) * 75) + '%';

      var plainText = (chapter.fullText || '').replace(/<[^>]*>/g, ' ');
      var relevant = localFixes.filter(function(f) {
        return plainText.toLowerCase().indexOf(f.find.toLowerCase().substring(0, 40)) > -1;
      });

      if (!relevant.length) continue;

      var fixBlock = relevant.map(function(f, fi) {
        return 'FIX ' + (fi+1) + ':\nFIND: ' + f.find + '\nREPLACE: ' + f.replace;
      }).join('\n\n');

      var userMsg = 'CHAPTER: ' + (chapter.heading || 'Chapter ' + chapter.chapter) + '\n\n' +
        'APPLY THESE FIXES:\n' + fixBlock + '\n\n' +
        'CHAPTER HTML:\n' + (chapter.fullText || '').substring(0, 12000);

      try {
        var result = await callAI(sys, userMsg, 4096);
        result = result.replace(/^```[\w]*\n?/, '').replace(/\n?```$/, '').trim();

        if (!preview && result && result.length > 80) {
          relevant.forEach(function(f) {
            var wasIn = (chapter.fullText || '').indexOf(f.find) > -1;
            var stillIn = result.indexOf(f.find) > -1;
            var idx = localFixes.indexOf(f);
            if (wasIn && !stillIn) {
              fixLog.push({num:idx+1, st:'ok', desc:'"' + f.find.substring(0,60) + '" \u2192 applied in "' + (chapter.heading||'Ch.'+chapter.chapter) + '"'});
              fixStats.applied++;
            } else if (wasIn && stillIn) {
              fixLog.push({num:idx+1, st:'sk', desc:'"' + f.find.substring(0,60) + '" \u2014 found but unchanged in "' + (chapter.heading||'Ch.'+chapter.chapter) + '"'});
              fixStats.skipped++;
            }
          });
          chapter.fullText = result;
        } else if (preview) {
          relevant.forEach(function(f) {
            var idx = localFixes.indexOf(f);
            fixLog.push({num:idx+1, st:'ok', desc:'[PREVIEW] "' + f.find.substring(0,60) + '" would be replaced in "' + (chapter.heading||'Ch.'+chapter.chapter) + '"'});
            fixStats.applied++;
          });
        }
      } catch(e) {
        fixLog.push({num:ci+1, st:'er', desc:'Chapter "' + (chapter.heading||'Ch.'+chapter.chapter) + '": ' + e.message});
        fixStats.errors++;
        toast('Ch.' + chapter.chapter + ' error: ' + e.message, 'er');
      }
    }
  }

  localFixes.forEach(function(f, fi) {
    var found = fixLog.some(function(l) { return l.num === fi+1; });
    if (!found) {
      fixLog.push({num:fi+1, st:'sk', desc:'"' + f.find.substring(0,70) + '" \u2014 not found in manuscript'});
      fixStats.skipped++;
    }
  });

  if(bar) bar.style.width = '100%';
  if(lbl) lbl.textContent = 'Done!';
  if(ctr) ctr.textContent = fixStats.applied + ' applied, ' + fixStats.skipped + ' not found' + (fixStats.errors ? ', ' + fixStats.errors + ' errors' : '');
  setTimeout(function() { if(prog) prog.style.display = 'none'; }, 4000);

  saveP();
  toast(fixStats.applied + ' fix' + (fixStats.applied !== 1 ? 'es' : '') + ' applied!', 'ok');
  showView('fixengine');
}
function exportFixed(){
  var rd = readableEvents();

  var htmlData = '<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>';
  rd.forEach(function(e) {
    htmlData += '<h1>'+esc(e.heading || 'CHAPTER ' + e.chapter)+'</h1>' + (e.fullText || '') + '<br clear="all" style="page-break-before:always" />';

function ensureEventIds(){
  events.forEach(function(e,i){
    if(e.fullText&&e.fullText.indexOf('<')===-1&&e.fullText.indexOf('class="hspan"')===-1){
      var stableId=e.fullText.substring(0,80);
      var hls=highlights.filter(function(h){return h.chapterId===stableId||h.chapterId==='idx_'+i;}).sort(function(a,b){return a.start-b.start;});
      if(!hls.length){e.fullText=escPreserve(e.fullText);}
      else{
        var out='';var pos=0;
        hls.forEach(function(h){
          if(h.start>pos)out+=escPreserve(e.fullText.slice(pos,h.start));
          var bg=HL_BG[h.color]||HL_BG.yellow, solid=HL_SOLID[h.color]||HL_SOLID.yellow;
          var tagStr=h.tags&&h.tags.length?'#'+h.tags.join(' #'):'';
          out+='<span class="hspan hc-'+esc(h.color)+'" style="background:'+bg+';outline:1px solid '+solid+'22;" data-hlid="'+h.id+'" title="'+esc(tagStr)+'" onclick="openHLEdit(\''+h.id+'\')">' +escPreserve(e.fullText.slice(h.start,h.end))+'</span>';
          pos=h.end;
        });
        if(pos<e.fullText.length)out+=escPreserve(e.fullText.slice(pos));
        e.fullText=out;
      }
    }
  });
  var rd=readableEvents();
  highlights.forEach(function(h){
    var ev=rd[h.chIdx];
    if(ev&&ev.fullText&&!h.chapterId){h.chapterId=ev.fullText.substring(0,80);}
    else if(!h.chapterId){h.chapterId='idx_'+h.chIdx;}
  });
}

async function analyzeChapter(body,num){
  var sys='You are a story analyst. Respond ONLY with valid JSON, no markdown.\nReturn: {"summary":"one sentence max 15 words","characters":["Name"],"location":"place or empty"}\nOnly proper character names.';
  var msg='Chapter '+num+':\n\n'+body.substring(0,1500);
  var text=await callAI(sys,msg,200);
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

async function callAI(sys, msg, maxTok) {
  var ai = getAI();
  maxTok = maxTok || 2000;
  var p = ai.p || 'claude';
  var pv = PROVS[p] || PROVS.claude;
  var model = pv.model;
  var r, d;

  if (p === 'claude') {
    r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ai.k,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({model:model, max_tokens:maxTok, system:sys, messages:[{role:'user',content:msg}]})
    });
    d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return (d.content[0].text || '').trim();
  }

  if (p === 'openai') {
    r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+ai.k},
      body: JSON.stringify({model:model, max_tokens:maxTok, messages:[{role:'system',content:sys},{role:'user',content:msg}]})
    });
    d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return (d.choices[0].message.content || '').trim();
  }

  if (p === 'gemini') {
    r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+ai.k, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction: {parts:[{text:sys}]},
        contents: [{parts:[{text:msg}]}],
        generationConfig: {maxOutputTokens:maxTok, temperature:0.2}
      })
    });
    d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    if (!d.candidates || !d.candidates[0]) throw new Error('Gemini returned no response');
    return (d.candidates[0].content.parts[0].text || '').trim();
  }

  if (p === 'deepseek') {
    r = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+ai.k},
      body: JSON.stringify({model:model, max_tokens:maxTok, messages:[{role:'system',content:sys},{role:'user',content:msg}]})
    });
    d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return (d.choices[0].message.content || '').trim();
  }

  if (p === 'grok') {
    r = await fetch('https://api.x.ai/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+ai.k},
      body: JSON.stringify({model:model, max_tokens:maxTok, messages:[{role:'system',content:sys},{role:'user',content:msg}]})
    });
    d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    return (d.choices[0].message.content || '').trim();
  }

  throw new Error('Unknown provider: ' + p);
}

// ── DOCX EXTRACTION ───────────────────────────────
async function extractDocxText(arrayBuffer){
  var bytes=new Uint8Array(arrayBuffer);
  var eocd=-1;
  for(var i=bytes.length-22;i>=0;i--){if(bytes[i]===0x50&&bytes[i+1]===0x4B&&bytes[i+2]===0x05&&bytes[i+3]===0x06){eocd=i;break;}}
  if(eocd<0)throw new Error('Not a valid ZIP/DOCX');
  var cdOff=readU32(bytes,eocd+16), cdSize=readU32(bytes,eocd+12);
  var pos=cdOff;
  while(pos<cdOff+cdSize){
    if(bytes[pos]!==0x50||bytes[pos+1]!==0x4B||bytes[pos+2]!==0x01||bytes[pos+3]!==0x02)break;
    var compression=readU16(bytes,pos+10), compSize=readU32(bytes,pos+20), fnLen=readU16(bytes,pos+28), extraLen=readU16(bytes,pos+30), cmtLen=readU16(bytes,pos+32), lhOff=readU32(bytes,pos+42);
    var fname=bytesToStr(bytes.slice(pos+46,pos+46+fnLen));
    if(fname==='word/document.xml'){
      var lFnLen=readU16(bytes,lhOff+26), lExtraLen=readU16(bytes,lhOff+28);
      var dataStart=lhOff+30+lFnLen+lExtraLen;
      var compressed=bytes.slice(dataStart,dataStart+compSize);
      var xml;
      if(compression===0){xml=bytesToStr(compressed);}
      else if(compression===8){xml=await inflateRaw(compressed);}
      else{throw new Error('Unsupported compression: '+compression);}
      return parseDocXml(xml);
    }
    pos+=46+fnLen+extraLen+cmtLen;
  }
  throw new Error('word/document.xml not found in DOCX');
}
async function inflateRaw(data){
  var ds=new DecompressionStream('deflate-raw');
  var writer=ds.writable.getWriter(), reader=ds.readable.getReader();
  writer.write(data); writer.close();
  var chunks=[];
  while(true){var res=await reader.read();if(res.done)break;chunks.push(res.value);}
  var totalLen=chunks.reduce(function(a,b){return a+b.length;},0);
  var out=new Uint8Array(totalLen); var offset=0;
  chunks.forEach(function(ch){out.set(ch,offset);offset+=ch.length;});
  return new TextDecoder('utf-8').decode(out);
}
function parseDocXml(xml){
  var lines=[];
  var paras=xml.split(/<w:p[ >\/]/);
  paras.forEach(function(para){
    var runs='', re=/<w:r[ >\/](.*?)<\/w:r>/g, reText=/<w:t[^>]*>([^<]*)<\/w:t>/, m;
    while((m=re.exec(para))!==null){
      var run=m[0], tMatch=run.match(reText);
      if(tMatch){
        var text=tMatch[1];
        if(run.indexOf('<w:b/>')>-1||run.indexOf('<w:b ')>-1)text='<b>'+text+'</b>';
        if(run.indexOf('<w:i/>')>-1||run.indexOf('<w:i ')>-1)text='<i>'+text+'</i>';
        if(run.indexOf('<w:u ')>-1)text='<u>'+text+'</u>';
        runs+=text;
      }
    }
    var line=runs.trim(); if(line)lines.push('<p>'+line+'</p>');
  });
  return lines.join('\n');
}

document.getElementById('fileInput').addEventListener('change',function(){
  var file=this.files[0]; if(!file) return;
  var name=file.name.toLowerCase();
  toast('Reading file…','in');
  if(name.endsWith('.docx')){
    var r=new FileReader();
    r.onload=function(e){
      if(typeof mammoth!=='undefined'){
        mammoth.convertToHtml({arrayBuffer:e.target.result}).then(function(res){parseImport(res.value,file.name);}).catch(function(err){toast('DOCX error: '+err.message,'er');});
      }else{
        extractDocxText(e.target.result).then(function(text){parseImport(text,file.name);}).catch(function(err){toast('DOCX read error: '+err.message,'er');});
      }
    };
    r.readAsArrayBuffer(file);
  }else if(name.endsWith('.txt')){
    var r2=new FileReader();
    r2.onload=function(e){parseImport(e.target.result,file.name);};
    r2.readAsText(file);
  }else{toast('Use .txt or .docx','er');}
  this.value='';
});

async function parseImport(rawHtml,filename){
  var div=document.createElement('div');
  rawHtml=rawHtml.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'');
  if(rawHtml.indexOf('<')===-1){rawHtml=rawHtml.split('\n').map(function(p){return '<p>'+p+'</p>';}).join('');}
  div.innerHTML=rawHtml;
  var chapters=[], currentHeading=filename.replace(/\.[^.]+$/,''), currentBody=document.createElement('div');
  var chRe=/^(prologue|epilogue|chapter\s+[\divxlcdm]+)/i;
  var bodyNode=div.querySelector('body')||div;
  Array.from(bodyNode.childNodes).forEach(function(node){
    var text=node.textContent||'';
    if(node.nodeType===1&&chRe.test(text.trim())){
      if(currentBody.innerHTML.trim()||chapters.length===0) chapters.push({heading:currentHeading,body:currentBody.innerHTML});
      currentHeading=text.trim(); currentBody=document.createElement('div');
      currentBody.appendChild(node.cloneNode(true));
    }else{currentBody.appendChild(node.cloneNode(true));}
  });
  if(currentBody.innerHTML.trim()||chapters.length===0) chapters.push({heading:currentHeading,body:currentBody.innerHTML});
  
  // Clear all history/highlights/events on new load as requested
  events=[]; chars=[]; locs=[]; highlights=[]; fixLog=[]; fixStats={applied:0,skipped:0,errors:0};
  
  var start=events.length;
  chapters.forEach(function(ch,i){
    events.push({id:uid(),chapter:i+1,heading:ch.heading,event:'Analyzing…',characters:'',location:'',notes:ch.body.replace(/<[^>]*>?/gm,'').substring(0,400).replace(/\s+/g,' ').trim(),fullText:ch.body});
  });
  showView('timeline'); renderView(); ensureEventIds();
  toast(chapters.length+' chapter'+(chapters.length!==1?'s':'')+' imported','in');
  var ai=getAI();
  if(!ai.k){
    chapters.forEach(function(ch,i){events[start+i].event=ch.body.replace(/<[^>]*>?/gm,'').trim().split(/[.!?\n]/)[0].trim().substring(0,80)||ch.heading;});
    renderView();updateBadges();toast('No AI key — used first sentence. Set key in AI Settings.','in');return;
  }
  var ind=document.getElementById('ai-ind'),bar=document.getElementById('ai-bar'),lbl=document.getElementById('ai-lbl'),ctr=document.getElementById('ai-ctr');
  ind.style.display='block';
  var done=0;
  for(var i=0;i<chapters.length;i++){
    var ch=chapters[i];
    lbl.textContent='Chapter '+(i+1)+' of '+chapters.length;
    ctr.textContent=(i+1)+' / '+chapters.length;
    bar.style.width=Math.round((i/chapters.length)*100)+'%';
    try{
      var res=await analyzeChapter(ch.body.replace(/<[^>]*>?/gm,''),i+1);
      var idx=start+i;
      events[idx].event=res.summary||ch.heading;
      events[idx].characters=Array.isArray(res.characters)?res.characters.join(', '):(res.characters||'');
      events[idx].location=res.location||'';
      done++;
      if(curView==='timeline')renderView();
    }catch(err){events[start+i].event=ch.body.replace(/<[^>]*>?/gm,'').trim().split(/[.!?\n]/)[0].trim().substring(0,80)||ch.heading;toast('Ch.'+(i+1)+' AI error: '+err.message,'er');}
  }
  bar.style.width='100%';lbl.textContent='Done';ctr.textContent=done+'/'+chapters.length+' succeeded';
  setTimeout(function(){ind.style.display='none';},3500);
  renderView();updateBadges();toast(done+' chapter'+(done!==1?'s':'')+' analyzed','ok');
}

  document.getElementById('mr').innerHTML=html;
}
function _openPicker(){
  loadPickerAPI(function(){
    try{
      var view=new google.picker.DocsView().setMimeTypes('application/vnd.google-apps.document').setSelectFolderEnabled(false);
      var picker=new google.picker.PickerBuilder().addView(view).setOAuthToken(_gToken).setTitle('Choose a Google Doc to import').setCallback(function(data){if(data.action===google.picker.Action.PICKED){var doc=data.docs[0];fetchGDoc(doc.id,doc.name);}}).build();
      picker.setVisible(true);
    }catch(e){toast('Picker failed: '+e.message,'er');_openDocByUrl();}
  });
}
function _openDocByUrl(){
  closeModal();
  var html='<div class="mov" onclick="if(event.target===this)closeModal()"><div class="mo" style="max-width:500px">';
  html+='<div class="mot">Open Google Doc by URL</div><div class="mos">Paste the URL of any Google Doc you have view access to.</div>';
  html+='<div class="fg"><label class="fl">Google Doc URL</label><input class="fi2" id="gdocurl" placeholder="https://docs.google.com/document/d/…" oninput="_previewDocUrl(this.value)" onkeydown="if(event.key===\'Enter\')_importDocByUrl()"></div>';
  html+='<div id="gdoc-url-hint" style="font-size:12px;color:var(--t2);margin-top:-8px;margin-bottom:12px;min-height:18px;"></div>';
  html+='<div class="mof"><button class="btn bs" onclick="closeModal()">Cancel</button><button class="btn ba" id="gdoc-url-go" onclick="_importDocByUrl()" disabled>Import</button></div>';
  html+='</div></div>';
  document.getElementById('mr').innerHTML=html;
  setTimeout(function(){var f=document.getElementById('gdocurl');if(f)f.focus();},100);
}
function _previewDocUrl(val){
  var hint=document.getElementById('gdoc-url-hint'), btn=document.getElementById('gdoc-url-go');
  var m=val.match(/\/document\/d\/([\w-]+)/);
  if(m){if(hint)hint.innerHTML='<span style="color:var(--ok)">✓ Valid URL — Doc ID: <code style="font-family:\'DM Mono\',monospace">'+m[1].substring(0,20)+'…</code></span>';if(btn)btn.disabled=false;}
  else{if(hint)hint.textContent=val.length>5?'Not a valid Google Docs URL':'';if(btn)btn.disabled=true;}
}
async function _importDocByUrl(){
  var input=document.getElementById('gdocurl'), val=input?input.value:'';
  var m=val.match(/\/document\/d\/([\w-]+)/);
  if(!m){toast('Invalid URL','er');return;}
  closeModal();await fetchGDoc(m[1],'Google Doc');
}
async function fetchGDoc(docId,docName){
  if(!_gToken){toast('Not signed in to Google','er');return;}
  toast('Fetching "'+docName+'"…','in');
  try{
    var resp=await fetch('https://www.googleapis.com/drive/v3/files/'+encodeURIComponent(docId)+'/export?mimeType=text%2Fhtml',{headers:{'Authorization':'Bearer '+_gToken}});
    if(resp.status===
       401){_gToken=null;updateGDocBtn();toast('Session expired — please reconnect','er');gSignIn(function(){fetchGDoc(docId,docName);});return;}
    if(resp.status===403){toast('Access denied','er');return;}
    if(!resp.ok){var errText=await resp.text().catch(function(){return'Unknown error';});throw new Error('HTTP '+resp.status+': '+errText.substring(0,120));}
    var text=await resp.text();
    if(!text||!text.trim()){toast('"'+docName+'" appears to be empty','er');return;}
    var m=text.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    if(m)text=m[1];
    parseImport(text,docName);
  }catch(e){toast('Import failed: '+e.message,'er');}
}

    var d=JSON.parse(localStorage.getItem('dref5'));
    if(d){events=d.events||[];chars=d.chars||[];locs=d.locs||[];highlights=d.highlights||[];fixLog=d.fixLog||[];fixStats=d.fixStats||{applied:0,skipped:0,errors:0};}
  }catch(e){}
  ensureEventIds();
  applyTheme(localStorage.getItem('dref_theme')||'light');
  updateSidebarAI();
  showView('dashboard');
})();
